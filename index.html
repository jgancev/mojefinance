<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Finance v0.3.5</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --tag-bg: #e2e8f0; --hover-bg: #f1f5f9; --field-bg: #ffffff; --field-text: #1e293b; --income: #10b981; --expense: #ef4444; }
        .dark { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f9fafb; --border: #334155; --tag-bg: #334155; --hover-bg: #4b5563; --field-bg: #ffffff; --field-text: #1e293b; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); transition: background 0.3s; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 320px 1fr 320px; } }

        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); height: fit-content; margin-bottom: 20px; }
        .header-card { background: var(--primary); color: white; border: none; grid-column: 1 / -1; display: flex; justify-content: space-around; text-align: center; padding: 25px; margin-bottom: 0; }
        
        .stat-val { font-size: 1.6rem; font-weight: 800; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 0.9rem; background: var(--field-bg); color: var(--field-text); }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        /* Tlačítka z verze 0.3.2 */
        .mode-btn, .settings-btn { width: auto; padding: 6px 12px; font-size: 0.8rem; background: var(--tag-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
        
        .txn-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .txn-item.future { opacity: 0.5; font-style: italic; }
        
        .chip { display:inline-block; padding:5px 12px; margin:0 5px 5px 0; background: var(--tag-bg); border-radius:12px; cursor:pointer; font-size:0.8rem; border: 1px solid var(--border); color: var(--text); }
        .chip.selected { background: var(--primary); color: white; border-color: var(--primary); }
        
        .edit-box { display: flex; flex-direction: column; gap: 5px; width: 100%; background: var(--hover-bg); padding: 10px; border-radius: 8px; }
        .hidden { display: none !important; }
        .icon-btn { cursor: pointer; opacity: 0.5; margin-left: 10px; font-style: normal; }
    </style>
</head>
<body>

<div id="authSection" style="max-width: 380px; margin: 80px auto;">
    <div class="card" id="loginBox">
        <h2>Přihlášení</h2>
        <input type="text" id="loginUser" placeholder="Jméno">
        <input type="password" id="loginPass" placeholder="Heslo">
        <button onclick="app.login()">Vstoupit</button>
        <p style="text-align:center; font-size: 0.8rem;">Nemáte účet? <a href="#" onclick="app.toggleAuth(true)">Registrace</a></p>
    </div>
    <div class="card hidden" id="regBox">
        <h2>Registrace</h2>
        <input type="text" id="regUser" placeholder="Jméno">
        <input type="password" id="regPass" placeholder="Heslo">
        <button onclick="app.register()">Vytvořit účet</button>
        <p style="text-align:center; font-size: 0.8rem;">Máte účet? <a href="#" onclick="app.toggleAuth(false)">Přihlášení</a></p>
    </div>
</div>

<div id="mainSection" class="hidden">
    <div style="max-width: 1300px; margin: 0 auto 15px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <strong id="userLabel"></strong>
            <button class="settings-btn" style="margin-left:10px" onclick="app.showSettings()">⚙️ Nastavení</button>
        </div>
        <button class="mode-btn" onclick="app.toggleDarkMode()">🌓 DarkMode</button>
    </div>

    <div class="dashboard-grid">
        <div class="card header-card">
            <div class="stat-box"><div>Na účtu</div><div class="stat-val" id="balToday">0 Kč</div></div>
            <div class="stat-box"><div>Výhled</div><div class="stat-val" id="balFuture">0 Kč</div></div>
        </div>

        <div id="leftCol">
            <div class="card">
                <h3 style="margin-top:0; color:var(--expense)">Výdaje</h3>
                <input type="date" id="expDate">
                <input type="text" id="expDesc" placeholder="Obchodník / Položka">
                <input type="number" id="expAmt" placeholder="Částka">
                <select id="expCat"></select>
                <button onclick="app.saveTxn(false)" style="background: var(--expense);">Uložit</button>
            </div>
            <div class="card">
                <h3 style="margin-top:0; color:var(--income)">Příjmy</h3>
                <input type="date" id="incDate">
                <input type="text" id="incDesc" placeholder="Popis příjmu">
                <input type="number" id="incAmt" placeholder="Částka">
                <button onclick="app.saveTxn(true)" style="background: var(--income);">Uložit</button>
            </div>
        </div>

        <div id="midCol">
            <div class="card">
                <h3 style="margin-top:0">Historie</h3>
                <div id="monthChips" style="margin-bottom: 15px; overflow-x: auto; white-space: nowrap;"></div>
                <div id="txnList"></div>
            </div>
        </div>

        <div id="rightCol">
            <div class="card" style="text-align: center;">
                <small>Denní limit do výplaty:</small>
                <div id="dailyAvg" style="font-size: 1.5rem; font-weight: 800;">0 Kč</div>
            </div>
            <div class="card"><canvas id="myChart"></canvas></div>
            <button onclick="location.reload()" style="background: #64748b; font-size: 0.8rem; border-radius: 8px; padding: 10px; color: white; border: none; width: 100%; cursor: pointer;">Odhlásit se</button>
        </div>
    </div>
</div>

<div id="settingsOverlay" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="max-width: 450px; width: 90%;">
        <h2 id="stTitle">Nastavení</h2>
        <div id="adminSection" class="hidden"><h4>Uživatelé</h4><div id="adminUserList"></div></div>
        <div id="userOnly">
            <h4>Moje kategorie (max 10)</h4>
            <div id="catEditor"></div>
            <button onclick="app.addCat()">+ Přidat</button>
        </div>
        <button onclick="app.changePass()" style="background:#64748b; margin-top:10px;">Změnit heslo</button>
        <button id="delBtn" onclick="app.deleteMe()" style="background:var(--expense); margin-top:5px;">Smazat profil</button>
        <button onclick="app.hideSettings()" style="margin-top:20px; background:var(--text)">Zavřít</button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const db = createClient('https://tnrtxrxwzwhsiqtahxzy.supabase.co', 'sb_publishable_hsQEHlhnq-G2gk7ospOI0g_HuSlwTIC');
    let chart = null;

    window.app = {
        user: null, txns: [], curMonth: 'all', editingId: null,
        defCats: ["Jídlo 🍕", "Běžné 🏠", "Blbosti 🛍️", "Nadstandartní ✨", "Spoření 💰"],

        async login() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value;
            const { data } = await db.from('app_users').select('*').eq('username', u).eq('password', p).maybeSingle();
            if(!data) return alert("Chyba přihlášení");
            this.user = data;
            if(this.user.is_admin) this.showSettings(); else {
                if(!this.user.custom_categories) this.user.custom_categories = this.defCats;
                this.init();
            }
        },

        async register() {
            const u = document.getElementById('regUser').value.trim();
            const p = document.getElementById('regPass').value;
            await db.from('app_users').insert([{ username:u, password:p, is_admin:false, custom_categories:this.defCats }]);
            this.toggleAuth(false);
        },

        init() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('userLabel').innerText = `👤 ${this.user.username}`;
            const today = new Date().toISOString().slice(0,10);
            document.getElementById('expDate').value = today; document.getElementById('incDate').value = today;
            this.renderCats(); this.loadTxns();
        },

        async loadTxns() {
            const { data } = await db.from('transactions').select('*').eq('user_id', this.user.id).order('date', {ascending: true});
            this.txns = data || [];
            this.updateUI();
        },

        updateUI() {
            const now = new Date().toISOString().slice(0,10);
            const balToday = this.txns.filter(t => t.date <= now).reduce((a, b) => a + b.amount, 0);
            const balFuture = this.txns.reduce((a, b) => a + b.amount, 0);
            document.getElementById('balToday').innerText = `${balToday.toLocaleString()} Kč`;
            document.getElementById('balFuture').innerText = `${balFuture.toLocaleString()} Kč`;
            document.getElementById('dailyAvg').innerText = `${Math.round(balToday / this.calcDays()).toLocaleString()} Kč`;

            const months = ['all', ...new Set(this.txns.map(t => t.date.slice(0,7)).sort().reverse())];
            document.getElementById('monthChips').innerHTML = months.map(m => `
                <span class="chip ${this.curMonth===m?'selected':''}" onclick="app.setMonth('${m}')">${m==='all'?'Vše':m}</span>
            `).join('');

            const filtered = this.curMonth === 'all' ? this.txns : this.txns.filter(t => t.date.slice(0,7) === this.curMonth);
            document.getElementById('txnList').innerHTML = filtered.slice().reverse().map(t => {
                if(this.editingId === t.id) return this.renderEditRow(t);
                return `
                <div class="txn-item ${t.date > now ? 'future' : ''}">
                    <div><strong>${t.description}</strong><br><small>${t.date > now ? '⏳ ':''}${t.date} • ${t.category}</small></div>
                    <div style="color:${t.amount>0?'var(--income)':'var(--expense)'}">
                        <strong>${t.amount.toLocaleString()} Kč</strong>
                        <i class="icon-btn" onclick="app.editingId='${t.id}'; app.updateUI();">✏️</i>
                        <i class="icon-btn" onclick="app.delTxn('${t.id}')">✕</i>
                    </div>
                </div>`;
            }).join('');
            this.updateChart(filtered);
        },

        renderEditRow(t) {
            const cats = t.amount > 0 ? ['Příjem'] : this.user.custom_categories;
            return `<div class="edit-box">
                <input type="date" id="edDate" value="${t.date}">
                <input type="text" id="edDesc" value="${t.description}">
                <input type="number" id="edAmt" value="${Math.abs(t.amount)}">
                <select id="edCat">${cats.map(c=>`<option ${t.category===c?'selected':''}>${c}</option>`).join('')}</select>
                <div style="display:flex; gap:5px"><button onclick="app.saveEdit('${t.id}', ${t.amount>0})">Uložit</button><button onclick="app.editingId=null; app.updateUI()" style="background:#64748b">Zpět</button></div>
            </div>`;
        },

        async saveEdit(id, isInc) {
            const amt = document.getElementById('edAmt').value;
            await db.from('transactions').update({ date: document.getElementById('edDate').value, description: document.getElementById('edDesc').value, amount: isInc ? Math.abs(amt) : -Math.abs(amt), category: document.getElementById('edCat').value }).eq('id', id);
            this.editingId = null; this.loadTxns();
        },

        async saveTxn(isInc) {
            const d = isInc ? document.getElementById('incDate').value : document.getElementById('expDate').value;
            const desc = isInc ? document.getElementById('incDesc').value : document.getElementById('expDesc').value;
            const amt = isInc ? document.getElementById('incAmt').value : document.getElementById('expAmt').value;
            if(!desc || !amt) return;
            await db.from('transactions').insert([{ user_id: this.user.id, description: desc, amount: isInc?Math.abs(amt):-Math.abs(amt), category: isInc?'Příjem':document.getElementById('expCat').value, date: d }]);
            this.loadTxns();
        },

        async delTxn(id) { if(confirm("Smazat?")) { await db.from('transactions').delete().eq('id', id); this.loadTxns(); } },

        renderCats() {
            document.getElementById('expCat').innerHTML = this.user.custom_categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('catEditor').innerHTML = this.user.custom_categories.map((c, i) => `
                <div style="display:flex; gap:5px; margin-bottom:5px"><input type="text" value="${c}" onchange="app.editCat(${i}, this.value)" style="margin:0"><button onclick="app.delCat(${i})" style="width:auto; background:var(--expense); margin:0">✕</button></div>`).join('');
        },
        async editCat(i,v) { this.user.custom_categories[i]=v; await this.saveCats(); },
        async addCat() { if(this.user.custom_categories.length<10){this.user.custom_categories.push("Nová"); await this.saveCats(); this.renderCats();} },
        async delCat(i) { this.user.custom_categories.splice(i,1); await this.saveCats(); this.renderCats(); },
        async saveCats() { await db.from('app_users').update({custom_categories:this.user.custom_categories}).eq('id', this.user.id); },

        showSettings() {
            document.getElementById('settingsOverlay').classList.remove('hidden');
            if(this.user.is_admin) {
                document.getElementById('adminSection').classList.remove('hidden');
                document.getElementById('userOnly').classList.add('hidden');
                document.getElementById('delBtn').classList.add('hidden');
                this.loadUsers();
            }
        },
        async loadUsers() {
            const {data} = await db.from('app_users').select('*');
            document.getElementById('adminUserList').innerHTML = data.map(u => `<div style="display:flex; justify-content:space-between; margin-bottom:5px"><span>${u.username}</span>${u.id!==this.user.id?`<button onclick="app.admDel('${u.id}')" style="width:auto; background:red">Smazat</button>`:'(Já)'}</div>`).join('');
        },
        async admDel(id) { if(confirm("Smazat?")){ await db.from('transactions').delete().eq('user_id',id); await db.from('app_users').delete().eq('id',id); this.loadUsers();} },
        hideSettings() { document.getElementById('settingsOverlay').classList.add('hidden'); if(!this.user.is_admin) this.updateUI(); },
        toggleAuth(reg) { document.getElementById('loginBox').classList.toggle('hidden', reg); document.getElementById('regBox').classList.toggle('hidden', !reg); },
        setMonth(m) { this.curMonth = m; this.updateUI(); },
        calcDays() {
            const today = new Date(); const target = new Date(today.getFullYear(), today.getMonth() + 1, 1);
            let wd = 0; while(true) { let d = target.getDay(); if(d !== 0 && d !== 6) wd++; if(wd === 2) break; target.setDate(target.getDate()+1); }
            return Math.max(1, Math.ceil((target - today) / 86400000));
        },
        updateChart(list) {
            const ctx = document.getElementById('myChart');
            const data = {}; list.filter(t => t.amount < 0).forEach(t => data[t.category] = (data[t.category]||0) + Math.abs(t.amount));
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#f97316', '#71717a', '#22c55e'] }] }, options: { plugins: { legend: { position: 'bottom', labels: { color: document.body.classList.contains('dark') ? '#fff' : '#444', boxWidth: 10, font: { size: 10 } } } } } });
        },
        toggleDarkMode() { const d = document.body.classList.toggle('dark'); localStorage.setItem('dark', d); }
    };
    if(localStorage.getItem('dark')==='true') document.body.classList.add('dark');
</script>
</body>
</html>
