<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="authSection" class="hidden">
    <div class="card" style="max-width: 380px; margin: 100px auto;">
        <h2>Přihlášení</h2>
        <input type="email" id="loginUser" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Heslo">
        <button id="loginBtn">Vstoupit</button>
    </div>
</div>

<div id="mainSection" class="hidden">
    <div class="header-main">
        <div id="userInfo">
            <strong id="userLabel"></strong>
        </div>
        <div id="headerActions">
            <button id="themeBtn" style="width:auto">🌓 Mode</button>
            <button id="openSettings" style="width:auto; margin-left:5px">⚙️</button>
            <button id="openAdmin" class="hidden" style="width:auto; margin-left:5px; background:#a855f7">👑 Admin</button>
        </div>
    </div>
    
    <div class="dashboard-grid">
        <div id="leftCol">
            <div class="card">
                <div class="stat-val" id="balToday">0</div>
                <p style="text-align:center; margin:0; font-size:0.9rem; opacity:0.7">Zůstatek</p>
            </div>
            <div class="card">
                <h3 style="color:var(--expense)">Výdaj</h3>
                <input type="date" id="expDate">
                <input type="text" id="expDesc" placeholder="Popis">
                <input type="number" id="expAmt" placeholder="Částka">
                <select id="expCat"></select>
                <button id="saveExpBtn" style="background:var(--expense)">Uložit</button>
            </div>
            <div class="card">
                <h3 style="color:var(--income)">Příjem</h3>
                <input type="date" id="incDate">
                <input type="text" id="incDesc" placeholder="Popis">
                <input type="number" id="incAmt">
                <button id="saveIncBtn" style="background:var(--income)">Uložit</button>
            </div>
        </div>

        <div id="midCol">
            <div class="card">
                <h3>Historie</h3>
                <div id="monthChips" style="overflow-x:auto; white-space:nowrap; margin-bottom:10px"></div>
                <div id="txnList"></div>
            </div>
        </div>

        <div id="rightCol">
            <div class="card">
                <p style="text-align:center; margin:0">Denní limit</p>
                <div id="dailyAvg" style="font-size: 1.8rem; font-weight: 800; text-align:center">0</div>
            </div>
            <div class="card"><canvas id="myChart"></canvas></div>
            <button id="logoutBtn" style="background:var(--border); color:var(--text)">Odhlásit se</button>
        </div>
    </div>
</div>

<div id="settingsOverlay" class="overlay hidden">
    <div class="card" style="width:90%; max-width:400px">
        <h2>Nastavení</h2>
        <select id="stCurr"><option value="Kč">Kč</option><option value="€">€</option></select>
        <h4>Kategorie</h4>
        <div id="catEditor"></div>
        <button id="addCatBtn">+ Přidat</button>
        <button id="closeSettings" style="margin-top:10px">Zavřít</button>
    </div>
</div>

<div id="adminOverlay" class="overlay hidden">
    <div class="card" style="width:95%; max-width:600px">
        <h2>Admin Panel</h2>
        <div id="adminUserList"></div>
        <button id="closeAdmin" style="margin-top:10px">Zavřít</button>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
