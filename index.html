<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje Finance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --tag-bg: #e2e8f0; --hover-bg: #f1f5f9; --field-bg: #ffffff; --field-text: #1e293b; }
.dark { --primary: #1e40af; --bg: #121212; --card: #374151; --text: #f9fafb; --border: #4b5563; --tag-bg: #4b5563; --hover-bg: #4b5563; --field-bg: #ffffff; --field-text: #1e293b; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
.container { max-width: 500px; margin: 0 auto; }
.header-card { background: var(--primary); color: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
.stats { display: flex; justify-content: space-between; }
.stat-val { font-size: 1.5rem; font-weight: bold; }
.form-card, .list-card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
.chart-card { max-width: 300px; margin: 0 auto; }
input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 1rem; background: var(--field-bg); color: var(--field-text); }
button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
.transaction { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.tag { font-size: 0.8rem; padding: 2px 8px; border-radius: 12px; background: var(--tag-bg); color: var(--text); }
.month-chip { display:inline-block; padding:4px 8px; margin:0 4px 4px 0; background: var(--tag-bg); border-radius:12px; cursor:pointer; font-size:0.9rem; color: var(--text); }
.month-chip.selected { background: var(--primary); color: white; }
</style>
</head>
<body>

<div class="container" id="authSection">
    <h2>Login / Registrace</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Heslo">
    <button onclick="login()">Přihlásit</button>
    <button onclick="register()">Registrovat</button>
    <p id="authMsg" style="color:red;"></p>
</div>

<div class="container" id="appSection" style="display:none">
    <div style="text-align:right; margin-bottom:10px;">
        <span id="currentUserInfo"></span>
        <button onclick="logout()">Odhlásit</button>
    </div>

    <div class="header-card">
        <div>Zůstatek</div>
        <div class="stat-val" id="totalBalance">0 Kč</div>
    </div>

    <div class="form-card">
        <h3>Výdaje</h3>
        <input type="date" id="date">
        <input type="text" id="desc" placeholder="Popis">
        <input type="number" id="amount" placeholder="Částka">
        <select id="cat">
            <option value="Jídlo">Jídlo 🍕</option>
            <option value="Běžné">Běžné 🏠</option>
            <option value="Blbosti">Blbosti 🛍️</option>
            <option value="Nadst.">Nadstandartní ✨</option>
            <option value="Spoření">Spoření 💰</option>
        </select>
        <button onclick="addTransaction()">Uložit</button>
    </div>

    <div class="list-card chart-card">
        <canvas id="myChart"></canvas>
    </div>

    <div id="txnList"></div>
</div>

<script>
const SUPABASE_URL = 'https://tnrtxrxwzwhsiqtahxzy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_hsQEHlhnq-G2gk7ospOI0g_HuSlwTIC';
const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let transactions = [];
let myChart;

async function register() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) { document.getElementById('authMsg').innerText = error.message; return; }
    alert('Registrace proběhla, potvrď email.');
}

async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { document.getElementById('authMsg').innerText = error.message; return; }
    await loadTransactions();
    showApp();
}

async function logout() {
    await supabase.auth.signOut();
    document.getElementById('appSection').style.display = 'none';
    document.getElementById('authSection').style.display = 'block';
}

function showApp() {
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('appSection').style.display = 'block';
    const user = supabase.auth.getUser();
    document.getElementById('currentUserInfo').innerText = user?.email || '';
}

async function addTransaction() {
    const date = document.getElementById('date').value;
    const desc = document.getElementById('desc').value;
    const amount = parseFloat(document.getElementById('amount').value);
    const cat = document.getElementById('cat').value;
    const user = (await supabase.auth.getUser()).data.user;
    if (!user) return alert('Nepřihlášený!');
    const { data, error } = await supabase.from('transactions').insert([{ 
        user_id: user.id, date, description: desc, category: cat, amount
    }]);
    if (error) { alert(error.message); return; }
    loadTransactions();
}

async function loadTransactions() {
    const user = (await supabase.auth.getUser()).data.user;
    if (!user) return;
    const { data, error } = await supabase.from('transactions').select('*').eq('user_id', user.id).order('date', { ascending: false });
    if (error) { console.error(error); return; }
    transactions = data || [];
    updateUI();
}

function updateUI() {
    const txnList = document.getElementById('txnList');
    txnList.innerHTML = transactions.map(t => `<div class="transaction">
        <div><strong>${t.description}</strong> (${t.date})</div>
        <div style="color:${t.amount<0?'#ef4444':'#10b981'}">${t.amount} Kč</div>
    </div>`).join('');

    const total = transactions.reduce((a,b)=>a+b.amount,0);
    document.getElementById('totalBalance').innerText = total.toLocaleString() + ' Kč';

    // chart
    const summary = {};
    transactions.forEach(t => { if (t.amount < 0) summary[t.category] = (summary[t.category]||0)+Math.abs(t.amount); });
    const ctx = document.getElementById('myChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(summary), datasets: [{ data: Object.values(summary), backgroundColor:['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6'] }] }, options:{plugins:{legend:{position:'bottom'}}} });
}
</script>

</body>
</html>
