<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Finance v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --tag-bg: #e2e8f0; --hover-bg: #f1f5f9; --field-bg: #ffffff; --field-text: #1e293b; }
        .dark { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f9fafb; --border: #334155; --tag-bg: #334155; --hover-bg: #4b5563; --field-bg: #ffffff; --field-text: #1e293b; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); transition: background 0.3s; }
        
        /* Layout Grid */
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 900px) { .dashboard-grid { grid-template-columns: 350px 1fr 350px; } }

        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); height: fit-content; }
        
        .header-card { background: var(--primary); color: white; border: none; grid-column: 1 / -1; display: flex; justify-content: space-around; text-align: center; padding: 25px; }
        .stat-box { flex: 1; }
        .stat-label { font-size: 0.8rem; opacity: 0.9; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-size: 1.6rem; font-weight: 800; }

        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 1rem; background: var(--field-bg); color: var(--field-text); }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .txn-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .txn-item.future { opacity: 0.5; font-style: italic; } /* Zašednutí budoucích */
        
        .chip { display:inline-block; padding:4px 10px; margin:0 4px 4px 0; background: var(--tag-bg); border-radius:12px; cursor:pointer; font-size:0.85rem; }
        .chip.selected { background: var(--primary); color: white; }
        
        .cat-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .mode-btn, .settings-btn { width: auto; padding: 6px 12px; font-size: 0.8rem; background: var(--tag-bg); color: var(--text); border: 1px solid var(--border); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="authSection" class="container" style="max-width: 400px; margin: 100px auto;">
    <div class="card" id="loginBox">
        <h2 style="margin-top:0">Přihlášení</h2>
        <input type="text" id="loginUser" placeholder="Jméno">
        <input type="password" id="loginPass" placeholder="Heslo">
        <button onclick="app.login()">Vstoupit</button>
        <p style="text-align:center; font-size: 0.9rem;">Nemáte účet? <a href="#" onclick="app.toggleAuth(true)">Registrace</a></p>
    </div>
    <div class="card hidden" id="regBox">
        <h2 style="margin-top:0">Registrace</h2>
        <input type="text" id="regUser" placeholder="Nové jméno">
        <input type="password" id="regPass" placeholder="Heslo">
        <button onclick="app.register()">Vytvořit účet</button>
        <p style="text-align:center; font-size: 0.9rem;">Máte účet? <a href="#" onclick="app.toggleAuth(false)">Přihlášení</a></p>
    </div>
</div>

<div id="mainSection" class="hidden">
    <div style="max-width: 1200px; margin: 0 auto 15px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <strong id="userLabel"></strong>
            <button class="settings-btn" onclick="app.showSettings()">⚙️ Nastavení</button>
        </div>
        <button class="mode-btn" onclick="app.toggleDarkMode()">🌓 DarkMode</button>
    </div>

    <div class="dashboard-grid">
        <div class="card header-card">
            <div class="stat-box">
                <div class="stat-label">Na účtu (Dnes)</div>
                <div class="stat-val" id="balToday">0 Kč</div>
            </div>
            <div style="width: 2px; background: rgba(255,255,255,0.2); margin: 0 15px;"></div>
            <div class="stat-box">
                <div class="stat-label">Výhled (Budoucí)</div>
                <div class="stat-val" id="balFuture">0 Kč</div>
            </div>
        </div>

        <div class="card" id="formsCol">
            <h3 style="margin-top:0">Nový záznam</h3>
            <input type="date" id="txnDate">
            <input type="text" id="txnDesc" placeholder="Popis / Obchodník">
            <input type="number" id="txnAmt" placeholder="Částka (Kč)">
            <select id="txnCat"></select>
            <div style="display: flex; gap: 5px;">
                <button onclick="app.saveTxn(true)" style="background: #10b981;">+ Příjem</button>
                <button onclick="app.saveTxn(false)" style="background: #ef4444;">- Výdaj</button>
            </div>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
            <canvas id="myChart"></canvas>
        </div>

        <div class="card" id="historyCol">
            <h3 style="margin-top:0">Historie plateb</h3>
            <div id="monthChips" style="margin-bottom: 15px;"></div>
            <div id="txnList"></div>
        </div>

        <div class="card" id="infoCol">
            <h3 style="margin-top:0">Statistiky</h3>
            <div class="stat-label" style="color: var(--text)">Denní limit do výplaty:</div>
            <div id="dailyAvg" style="font-size: 1.4rem; font-weight: bold; margin-bottom: 20px;">0 Kč</div>
            <button onclick="location.reload()" style="background: #64748b; font-size: 0.8rem;">Odhlásit se</button>
        </div>
    </div>
</div>

<div id="settingsOverlay" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="max-width: 450px; width: 90%;">
        <h2 style="margin-top:0">Nastavení</h2>
        <div id="adminSection" class="hidden">
            <h4 style="color:var(--primary)">Správa uživatelů (Admin)</h4>
            <div id="adminUserList" style="max-height: 150px; overflow-y:auto; margin-bottom:15px;"></div>
        </div>
        <h4>Kategorie (max 10)</h4>
        <div id="catEditor" style="max-height: 250px; overflow-y:auto;"></div>
        <button onclick="app.addCategorySlot()" style="background:transparent; color:var(--primary); border:1px dashed var(--primary); font-size:0.8rem;">+ Přidat kategorii</button>
        <hr>
        <button onclick="app.changePass()" style="background:#64748b">Změnit heslo</button>
        <button id="delProfBtn" onclick="app.deleteMe()" style="background:#ef4444; margin-top:5px;">Smazat můj profil</button>
        <button onclick="app.hideSettings()" style="margin-top:20px;">Zavřít a uložit</button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const db = createClient('https://tnrtxrxwzwhsiqtahxzy.supabase.co', 'sb_publishable_hsQEHlhnq-G2gk7ospOI0g_HuSlwTIC');
    let chart = null;

    window.app = {
        user: null, txns: [], curMonth: 'all',
        defCats: ["Jídlo 🍕", "Běžné 🏠", "Blbosti 🛍️", "Nadstandartní ✨", "Spoření 💰"],

        async login() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value;
            const { data } = await db.from('app_users').select('*').eq('username', u).eq('password', p).maybeSingle();
            if (!data) return alert("Chyba");
            this.user = data;
            if (!this.user.custom_categories || this.user.custom_categories.length === 0) this.user.custom_categories = this.defCats;
            this.init();
        },

        async register() {
            const u = document.getElementById('regUser').value.trim();
            const p = document.getElementById('regPass').value;
            await db.from('app_users').insert([{ username:u, password:p, is_admin:false, custom_categories:this.defCats }]);
            alert("Ok, přihlas se."); this.toggleAuth(false);
        },

        init() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('userLabel').innerText = `👤 ${this.user.username}`;
            document.getElementById('txnDate').value = new Date().toISOString().slice(0,10);
            this.renderCats();
            this.loadTxns();
        },

        async loadTxns() {
            const { data } = await db.from('transactions').select('*').eq('user_id', this.user.id).order('date', {ascending: true});
            this.txns = data;
            this.updateUI();
        },

        updateUI() {
            const now = new Date().toISOString().slice(0,10);
            
            // Výpočty zůstatků
            const balToday = this.txns.filter(t => t.date <= now).reduce((a, b) => a + b.amount, 0);
            const balFuture = this.txns.reduce((a, b) => a + b.amount, 0);
            
            document.getElementById('balToday').innerText = `${balToday.toLocaleString()} Kč`;
            document.getElementById('balFuture').innerText = `${balFuture.toLocaleString()} Kč`;
            
            // Denní průměr (do 2. prac. dne příštího měsíce)
            const days = this.calcDays();
            document.getElementById('dailyAvg').innerText = `${Math.round(balToday / days).toLocaleString()} Kč`;

            // Filtrování historie
            const months = ['all', ...new Set(this.txns.map(t => t.date.slice(0,7)).reverse())];
            document.getElementById('monthChips').innerHTML = months.map(m => `
                <span class="chip ${this.curMonth===m?'selected':''}" onclick="app.setMonth('${m}')">${m==='all'?'Vše':m}</span>
            `).join('');

            const filtered = this.curMonth === 'all' ? this.txns : this.txns.filter(t => t.date.slice(0,7) === this.curMonth);
            
            document.getElementById('txnList').innerHTML = filtered.slice().reverse().map(t => {
                const isFuture = t.date > now;
                return `
                <div class="txn-item ${isFuture ? 'future' : ''}">
                    <div>
                        <strong>${t.description}</strong><br>
                        <small>${isFuture ? '⏳ ' : ''}${new Date(t.date).toLocaleDateString()} • ${t.category}</small>
                    </div>
                    <div style="color:${t.amount > 0 ? '#10b981':'#ef4444'}">
                        <strong>${t.amount.toLocaleString()} Kč</strong>
                        <span onclick="app.delTxn('${t.id}')" style="margin-left:10px; cursor:pointer; font-style:normal;">✕</span>
                    </div>
                </div>`;
            }).join('');

            this.updateChart(filtered);
        },

        async saveTxn(isIncome) {
            const d = document.getElementById('txnDate').value;
            const desc = document.getElementById('txnDesc').value;
            const amt = document.getElementById('txnAmt').value;
            const cat = document.getElementById('txnCat').value;
            if(!desc || !amt) return;
            
            await db.from('transactions').insert([{
                user_id: this.user.id,
                description: desc,
                amount: isIncome ? Math.abs(amt) : -Math.abs(amt),
                category: isIncome ? 'Příjem' : cat,
                date: d
            }]);
            
            document.getElementById('txnDesc').value = ''; document.getElementById('txnAmt').value = '';
            this.loadTxns();
        },

        async delTxn(id) { if(confirm("Smazat?")) { await db.from('transactions').delete().eq('id', id); this.loadTxns(); } },

        // --- Kategorie & Nastavení ---
        renderCats() {
            document.getElementById('txnCat').innerHTML = this.user.custom_categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('catEditor').innerHTML = this.user.custom_categories.map((c, i) => `
                <div class="cat-row">
                    <input type="text" value="${c}" onchange="app.editCatName(${i}, this.value)">
                    <button onclick="app.delCatSlot(${i})" style="width:auto; background:#ef4444">✕</button>
                </div>
            `).join('');
        },

        async editCatName(i, val) { this.user.custom_categories[i] = val; await this.saveCats(); },
        async addCategorySlot() { if(this.user.custom_categories.length < 10) { this.user.custom_categories.push("Nová ✨"); await this.saveCats(); this.renderCats(); } },
        async delCatSlot(i) { this.user.custom_categories.splice(i,1); await this.saveCats(); this.renderCats(); },
        async saveCats() { await db.from('app_users').update({ custom_categories: this.user.custom_categories }).eq('id', this.user.id); this.renderCats(); },

        showSettings() {
            document.getElementById('settingsOverlay').classList.remove('hidden');
            if(this.user.is_admin) {
                document.getElementById('adminSection').classList.remove('hidden');
                document.getElementById('delProfBtn').classList.add('hidden');
                this.loadAdminUsers();
            }
        },
        hideSettings() { document.getElementById('settingsOverlay').classList.add('hidden'); this.updateUI(); },

        async loadAdminUsers() {
            const { data } = await db.from('app_users').select('*');
            document.getElementById('adminUserList').innerHTML = data.map(u => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:0.8rem">
                    <span>${u.username}</span>
                    ${u.id !== this.user.id ? `<button onclick="app.adminDelUser('${u.id}')" style="width:auto; padding:2px 5px; background:red">Smazat</button>` : ''}
                </div>
            `).join('');
        },

        // --- Pomocné ---
        setMonth(m) { this.curMonth = m; this.updateUI(); },
        toggleAuth(reg) { 
            document.getElementById('loginBox').classList.toggle('hidden', reg);
            document.getElementById('regBox').classList.toggle('hidden', !reg);
        },
        toggleDarkMode() { 
            const d = document.body.classList.toggle('dark'); 
            localStorage.setItem('dark', d); 
            if(this.user) this.updateUI();
        },
        calcDays() {
            const today = new Date();
            const target = new Date(today.getFullYear(), today.getMonth() + 1, 1);
            let wd = 0;
            while(true) {
                let d = target.getDay();
                if(d !== 0 && d !== 6) wd++;
                if(wd === 2) break;
                target.setDate(target.getDate()+1);
            }
            return Math.max(1, Math.ceil((target - today) / 86400000));
        },
        updateChart(list) {
            const ctx = document.getElementById('myChart');
            const data = {};
            list.filter(t => t.amount < 0).forEach(t => data[t.category] = (data[t.category]||0) + Math.abs(t.amount));
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#f97316', '#71717a', '#22c55e'] }] },
                options: { plugins: { legend: { position: 'bottom', labels: { color: document.body.classList.contains('dark') ? '#fff' : '#000' } } } }
            });
        }
    };
    if(localStorage.getItem('dark')==='true') document.body.classList.add('dark');
</script>
</body>
</html>
