<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Finance | Debug Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        #debug-console { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; border-radius: 8px; margin-top: 20px; max-height: 150px; overflow-y: auto; display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" class="card">
        <h2>Přihlášení</h2>
        <input type="text" id="loginUser" placeholder="Uživatelské jméno">
        <input type="password" id="loginPass" placeholder="Heslo">
        <button onclick="login()">Přihlásit</button>
        <button style="background: #10b981;" onclick="forceLogin()">🚀 Force Login (Test)</button>
        <div id="status-msg" style="color: red; font-size: 0.8rem; margin-top: 10px;"></div>
    </div>

    <div id="appSection" class="card hidden">
        <h2 id="welcomeMsg">Finance</h2>
        <div id="totalBalance" style="font-size: 2rem; font-weight: bold;">0 Kč</div>
        <hr>
        <input type="text" id="desc" placeholder="Popis">
        <input type="number" id="amount" placeholder="Částka">
        <button onclick="addTransaction()">Uložit</button>
        <div id="txnList" style="margin-top: 20px;"></div>
        <button onclick="location.reload()" style="background: #ef4444; margin-top: 20px;">Odhlásit</button>
    </div>

    <div id="debug-console">
        <div>[System] Inicializace...</div>
    </div>
</div>

<script>
    const log = (msg) => {
        const consoleEl = document.getElementById('debug-console');
        consoleEl.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    };

    // --- NASTAVENÍ ---
    const SB_URL = 'https://tnrtxrxwzwhsiqtahxzy.supabase.co';
    const SB_KEY = 'sb_publishable_hsQEHlhnq-G2gk7ospOI0g_HuSlwTIC';
    
    let supabase;
    let currentUser = null;

    window.onload = () => {
        log("Kontrola Supabase knihovny...");
        // V různých verzích CDN se objekt jmenuje různě (supabase nebo libsupabase)
        const clientFactory = window.supabase || window.libsupabase;
        
        if (!clientFactory) {
            log("CHYBA: Knihovna Supabase nebyla načtena! Zkontroluj internet nebo URL scriptu.");
            document.getElementById('status-msg').innerText = "Knihovna Supabase se nenačetla.";
            return;
        }

        try {
            supabase = clientFactory.createClient(SB_URL, SB_KEY);
            log("Supabase klient vytvořen.");
        } catch (e) {
            log("CHYBA inicializace: " + e.message);
        }
    };

    async function login() {
        const u = document.getElementById('loginUser').value;
        const p = document.getElementById('loginPass').value;
        log(`Pokus o login: ${u}`);

        try {
            const { data, error } = await supabase.from('app_users').select('*').eq('username', u).eq('password', p).maybeSingle();
            
            if (error) {
                log("DB Chyba: " + error.message);
                return;
            }
            if (!data) {
                log("Uživatel nenalezen.");
                alert("Špatné jméno nebo heslo");
                return;
            }

            currentUser = data;
            log("Login úspěšný.");
            startApp();
        } catch (e) {
            log("Kritická chyba: " + e.message);
        }
    }

    function forceLogin() {
        log("Spouštím Force Login...");
        currentUser = { id: '00000000-0000-0000-0000-000000000000', username: 'TestUser' };
        startApp();
    }

    function startApp() {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');
        document.getElementById('welcomeMsg').innerText = "Ahoj, " + currentUser.username;
        log("Aplikace spuštěna.");
        loadData();
    }

    async function loadData() {
        log("Načítám transakce...");
        const { data, error } = await supabase.from('transactions').select('*').eq('user_id', currentUser.id);
        if (error) {
            log("Chyba načítání: " + error.message);
            return;
        }
        log(`Načteno ${data.length} záznamů.`);
        
        const list = document.getElementById('txnList');
        list.innerHTML = '';
        let total = 0;
        data.forEach(t => {
            total += parseFloat(t.amount);
            list.innerHTML += `<div>${t.description}: ${t.amount} Kč</div>`;
        });
        document.getElementById('totalBalance').innerText = total + " Kč";
    }

    async function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amt = document.getElementById('amount').value;
        
        log("Ukládám novou transakci...");
        const { error } = await supabase.from('transactions').insert([{
            user_id: currentUser.id,
            description: desc,
            amount: parseFloat(amt),
            category: 'Test'
        }]);

        if (error) log("Chyba uložení: " + error.message);
        else {
            log("Uloženo OK.");
            loadData();
        }
    }
</script>

</body>
</html>
