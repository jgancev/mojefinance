<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Finance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="authSection" class="hidden container">
    <div class="card">
        <h2 id="t-loginTitle">Přihlášení</h2>
        <input type="email" id="loginUser" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Heslo">
        <button id="loginBtn">Přihlásit</button>
        <p id="toReg" style="cursor:pointer; text-align:center">Nemáte účet? Registrace</p>
    </div>
</div>

<div id="mainSection" class="hidden container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div>
            <strong id="userLabel"></strong>
            <button class="settings-btn" id="openSettings">⚙️</button>
            <button class="settings-btn hidden" id="openAdmin" style="background:#7c3aed">👑 Admin</button>
        </div>
        <button class="settings-btn" id="themeBtn">🌓 Mode</button>
    </div>

    <div class="card" style="text-align:center">
        <h1 id="balToday" style="margin:0">0</h1>
        <small id="t-onAccount">Zůstatek</small>
    </div>

    <div class="card">
        <h3>Nová transakce</h3>
        <input type="date" id="txnDate">
        <input type="text" id="txnDesc" placeholder="Popis">
        <input type="number" id="txnAmt" placeholder="Částka (mínus pro výdaj)">
        <select id="txnCat"></select>
        <button id="saveTxnBtn">Uložit transakci</button>
    </div>

    <div class="card">
        <h3>Historie</h3>
        <div id="monthChips"></div>
        <div id="txnList"></div>
    </div>

    <div class="card"><canvas id="myChart"></canvas></div>
    
    <button id="logoutBtn" style="background:#64748b">Odhlásit se</button>
</div>

<div id="settingsOverlay" class="overlay hidden">
    <div class="card" style="width: 90%; max-width: 400px;">
        <h2>Nastavení</h2>
        <label>Měna</label>
        <select id="stCurr"><option value="Kč">Kč</option><option value="€">€</option></select>
        <h4>Kategorie</h4>
        <div id="catEditor"></div>
        <button id="addCatBtn">+ Přidat</button>
        <button id="closeSettings" style="background:#475569; margin-top:10px">Zavřít</button>
    </div>
</div>

<div id="adminOverlay" class="overlay hidden">
    <div class="card" style="width: 95%; max-width: 600px; max-height: 80vh; overflow-y: auto;">
        <div style="display:flex; justify-content:space-between">
            <h2>Admin Dashboard</h2>
            <button id="closeAdmin" style="width:auto; background:none; color:var(--text); font-size:1.5rem">✕</button>
        </div>
        <div id="adminStats" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px">
            <div class="card" style="margin:0; text-align:center"><small>Uživatelů</small><br><b id="statUsers">0</b></div>
            <div class="card" style="margin:0; text-align:center"><small>Transakcí</small><br><b id="statTxns">0</b></div>
        </div>
        <div id="adminUserList"></div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
