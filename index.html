<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="authSection" class="hidden">
    <div class="card" style="max-width: 380px; margin: 100px auto;">
        <h2>Přihlášení</h2>
        <input type="email" id="loginUser" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Heslo">
        <button id="loginBtn">Vstoupit</button>
    </div>
</div>

<div id="mainSection" class="hidden">
    <div class="header-main">
        <strong id="userLabel"></strong>
        <button id="themeBtn" style="width:auto">🌓 Mode</button>
    </div>
    
    <div class="dashboard-grid">
        <div id="leftCol">
            <div class="card">
                <div id="balToday" style="font-size:2rem; font-weight:800; text-align:center; color:var(--income)">0</div>
                <p style="text-align:center; opacity:0.7; margin:0; font-size:0.9rem">Aktuální zůstatek</p>
            </div>
            <div class="card">
                <h3 style="color:var(--expense); margin-top:0">Výdaj</h3>
                <input type="date" id="expDate">
                <input type="text" id="expDesc" placeholder="Popis">
                <input type="number" id="expAmt" placeholder="Částka">
                <select id="expCat"></select>
                <button id="saveExpBtn" style="background:var(--expense)">Uložit výdaj</button>
            </div>
            <div class="card">
                <h3 style="color:var(--income); margin-top:0">Příjem</h3>
                <input type="date" id="incDate">
                <input type="text" id="incDesc" placeholder="Popis">
                <input type="number" id="incAmt" placeholder="Částka">
                <button id="saveIncBtn" style="background:var(--income)">Uložit příjem</button>
            </div>
        </div>

        <div id="midCol">
            <div class="card">
                <h3 style="margin-top:0">Historie transakcí</h3>
                <div id="monthChips" style="overflow-x:auto; white-space:nowrap; margin-bottom:15px; padding-bottom:5px"></div>
                <div id="txnList"></div>
            </div>
        </div>

        <div id="rightCol">
            <div class="card">
                <p style="text-align:center; margin:0; opacity:0.7">Denní limit</p>
                <div id="dailyAvg" style="font-size:2.2rem; font-weight:800; text-align:center; color:var(--primary)">0</div>
            </div>
            <div class="card">
                <canvas id="myChart"></canvas>
            </div>
            
            <div class="bottom-actions">
                <button id="openSettings" style="background:var(--border); color:var(--text)">Nastavit</button>
                <button id="openAdmin" class="hidden" style="background:#a855f7">Admin</button>
                <button id="logoutBtn" style="background:var(--border); color:var(--text)">Log-out</button>
            </div>
        </div>
    </div>
</div>

<div id="settingsOverlay" class="overlay hidden">
    <div class="card" style="width:90%; max-width:400px">
        <h2>Nastavení</h2>
        <label>Měna:</label>
        <select id="stCurr"><option value="Kč">Kč</option><option value="€">€</option><option value="$">$</option></select>
        <h4>Kategorie výdajů</h4>
        <div id="catEditor" style="max-height:200px; overflow-y:auto; margin-bottom:10px"></div>
        <button id="addCatBtn" style="background:var(--border); color:var(--text)">+ Přidat kategorii</button>
        <button id="closeSettings" style="margin-top:20px; background:var(--text); color:var(--card)">Zavřít</button>
    </div>
</div>

<div id="adminOverlay" class="overlay hidden">
    <div class="card" style="width:95%; max-width:650px; max-height:85vh; overflow-y:auto">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2>Admin Panel</h2>
            <button id="closeAdmin" style="width:auto; background:none; color:var(--text); font-size:1.5rem">✕</button>
        </div>
        <div id="adminUserList"></div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
