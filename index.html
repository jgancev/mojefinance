<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance App - George Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f2f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0;
            --primary: #0066e1; --income: #22ad5c; --expense: #e60050; --hover-bg: #f1f5f9;
            --accent-purple: #9d28b0; --accent-teal: #008183;
        }
        .dark { 
            --bg: #0f1115; --card: #1c1e26; --text: #f8fafc; --border: #2d313d; 
            --hover-bg: #2d3139; 
        }

        * { box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0,102,225,0.07), transparent 600px);
            min-height: 100vh;
        }

        .header-main {
            max-width: 1100px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
        }

        #userBtn {
            background: none; border: none; color: inherit;
            font-weight: 800; cursor: pointer; padding: 8px 12px;
            border-radius: 8px; font-size: 1rem; width: auto;
        }
        #userBtn:hover { background: var(--hover-bg); }

        .dashboard-grid {
            display: grid; grid-template-columns: 280px 1fr 280px;
            gap: 20px; padding: 20px; max-width: 1100px; margin: 0 auto;
        }

        @media (max-width: 1100px) {
            .dashboard-grid { grid-template-columns: 1fr; padding: 10px; }
        }

        .card {
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 14px; margin-bottom: 20px;
            position: relative; overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: var(--primary);
        }
        .card.income-card::before { background: var(--income); }
        .card.expense-card::before { background: var(--expense); }
        .card.purple-card::before { background: var(--accent-purple); }
        .card.teal-card::before { background: var(--accent-teal); }

        input, select, button {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 10px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        button { 
            background: var(--primary); color: white; border: none; 
            cursor: pointer; font-weight: 700; transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .btn-danger:hover { background: #fecaca; }

        .txn-item {
            position: relative; display: flex; justify-content: space-between; 
            padding: 14px 0; border-bottom: 1px solid var(--border);
            align-items: center;
        }
        
        .menu-container { position: relative; }
        .menu-button { 
            cursor: pointer; padding: 5px 10px; font-weight: bold; 
            font-size: 1.2rem; color: var(--primary); border-radius: 6px;
        }
        .menu-button:hover { background: var(--hover-bg); }
        .menu-options { 
            display: none; position: absolute; right: 0; top: 100%; 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 10px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); z-index: 100; 
            min-width: 140px;
        }
        .menu-options span { display: block; padding: 12px 16px; cursor: pointer; font-size: 0.9rem; }
        .menu-options span:hover { background: var(--hover-bg); }

        .chip {
            display: inline-block; padding: 8px 14px; background: var(--border);
            border-radius: 20px; font-size: 0.85rem; cursor: pointer; 
            margin-right: 8px; margin-bottom: 8px; font-weight: 600;
        }
        .chip.selected { background: var(--primary); color: white; }

        .tab-nav { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tab-link { padding: 10px 5px; cursor: pointer; opacity: 0.5; font-weight: 600; }
        .tab-link.active { opacity: 1; border-bottom: 3px solid var(--primary); color: var(--primary); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        .hidden { display: none !important; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
        
        #monthChips::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="dark">

<div id="authSection" class="hidden">
    <div class="card" style="max-width: 400px; margin: 100px auto;">
        <h2 style="margin-top:0">Vítejte zpět</h2>
        <p style="opacity: 0.6; font-size: 0.9rem;">Přihlaste se ke svému účtu Finance</p>
        <input type="email" id="loginUser" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Heslo">
        <button id="loginBtn" style="margin-top:15px">Vstoupit do aplikace</button>
    </div>
</div>

<div id="mainSection" class="hidden">
    <div class="header-main">
        <button id="userBtn"></button>
        <button id="themeBtn" style="width:auto; padding: 8px 16px; display: flex; align-items: center; gap: 8px;"></button>
    </div>
    
    <div class="dashboard-grid">
        <div id="leftCol">
            <div class="card">
                <div id="balToday" style="font-size:2.2rem; font-weight:800; text-align:center; letter-spacing:-1px;">0</div>
                <p style="text-align:center; opacity:0.6; margin:5px 0 0; font-size:0.9rem; font-weight:600;">Aktuální zůstatek</p>
            </div>
            
            <div class="card expense-card">
                <h3 style="color:var(--expense); margin:0 0 10px; font-size:1.1rem">Nový výdaj</h3>
                <input type="date" id="expDate">
                <input type="text" id="expDesc" placeholder="Za co jste utratili?">
                <input type="number" id="expAmt" placeholder="Částka">
                <select id="expCat"></select>
                <button id="saveExpBtn" style="background:var(--expense); margin-top:10px;">Zapsat výdaj</button>
            </div>
            
            <div class="card income-card">
                <h3 style="color:var(--income); margin:0 0 10px; font-size:1.1rem">Nový příjem</h3>
                <input type="date" id="incDate">
                <input type="text" id="incDesc" placeholder="Odkud peníze přišly?">
                <input type="number" id="incAmt" placeholder="Částka">
                <button id="saveIncBtn" style="background:var(--income); margin-top:10px;">Zapsat příjem</button>
            </div>
        </div>

        <div id="midCol">
            <div class="card">
                <h3 style="margin:0 0 15px; font-size:1.2rem">Historie plateb</h3>
                <div id="monthChips" style="overflow-x:auto; white-space:nowrap; margin-bottom:15px; padding-bottom:5px;"></div>
                <div id="txnList"></div>
            </div>
        </div>

        <div id="rightCol">
            <div class="card teal-card">
                <p style="text-align:center; margin:0; opacity:0.6; font-size:0.9rem; font-weight:600;">Můžete utratit denně</p>
                <div id="dailyAvg" style="font-size:1.8rem; font-weight:800; text-align:center; margin-top:5px;">0</div>
            </div>
            
            <div class="card purple-card">
                <h3 style="margin:0 0 15px; font-size:1rem; text-align:center; opacity:0.8">Rozložení výdajů</h3>
                <canvas id="myChart"></canvas>
            </div>
            
            <button id="logoutBtn" style="background:var(--border); color:var(--text); font-size:0.9rem; margin-top:10px;">Bezpečně odhlásit</button>
        </div>
    </div>
</div>

<div id="settingsOverlay" class="overlay hidden">
    <div class="card" style="width:95%; max-width:550px; padding:30px;">
        <div class="tab-nav">
            <span class="tab-link active" id="tab-gen-link" onclick="app.switchTab('general')">Nastavení</span>
            <span class="tab-link hidden" id="tab-adm-link" onclick="app.switchTab('admin')">Administrace</span>
        </div>

        <div id="tab-general">
            <label style="font-size:0.85rem; font-weight:700; display:block; margin-bottom:5px;">Preferovaná měna</label>
            <select id="stCurr" style="margin-bottom:20px;"><option value="Kč">Česká koruna (Kč)</option><option value="€">Euro (€)</option></select>
            
            <label style="font-size:0.85rem; font-weight:700; display:block; margin-bottom:5px;">Moje kategorie výdajů</label>
            <div id="catEditor" style="max-height:200px; overflow-y:auto; margin-bottom:10px;"></div>
            <button id="addCatBtn" style="background:var(--border); color:var(--text); font-size:0.9rem;">+ Přidat novou kategorii</button>
            
            <hr style="border:0; border-top:1px solid var(--border); margin: 25px 0;">
            <button onclick="app.deleteMyAccount()" class="btn-danger" style="font-size:0.9rem;">Definitivně smazat můj účet</button>
        </div>

        <div id="tab-admin" class="hidden">
            <h3 style="margin:0 0 15px;">Registrovaní uživatelé</h3>
            <div id="adminUserList" style="max-height: 350px; overflow-y: auto; border: 1px solid var(--border); border-radius:10px;"></div>
        </div>

        <button id="closeSettings" style="margin-top:25px; background:var(--text); color:var(--card)">Zavřít nastavení</button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import { config } from './config.js';

    const db = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
    let chart = null;

    const app = {
        user: null, txns: [], curMonth: 'all', 
        curr: 'Kč', theme: localStorage.getItem('theme') || 'dark',
        editingId: null, isAdmin: false,
        defCats: ["Jídlo 🍕", "Bydlení 🏠", "Doprava 🚗", "Nákupy 🛍️", "Zábava 🎭", "Ostatní ⚙️"],

        async start() {
            this.applyTheme();
            this.setupListeners();
            const { data: { session } } = await db.auth.getSession();
            if (session) await this.handleAuth(session.user);
            else document.getElementById('authSection').classList.remove('hidden');
        },

        setupListeners() {
            const get = (id) => document.getElementById(id);
            get('loginBtn').onclick = () => this.login();
            get('logoutBtn').onclick = () => this.logout();
            get('themeBtn').onclick = () => this.cycleTheme();
            get('userBtn').onclick = () => { get('settingsOverlay').classList.remove('hidden'); this.switchTab('general'); };
            get('closeSettings').onclick = () => get('settingsOverlay').classList.add('hidden');
            get('saveExpBtn').onclick = () => this.saveTxn(false);
            get('saveIncBtn').onclick = () => this.saveTxn(true);
            get('addCatBtn').onclick = () => this.addCat();
            get('stCurr').onchange = (e) => this.updateCurr(e.target.value);
            
            document.addEventListener('click', e => {
                if (!e.target.closest('.menu-container')) {
                    document.querySelectorAll('.menu-options').forEach(m => m.style.display = 'none');
                }
            });
        },

        async handleAuth(authUser) {
            this.user = authUser;
            const { data: prof } = await db.from('app_users').select('*').eq('id', authUser.id).maybeSingle();
            
            if (prof) {
                this.curr = prof.currency || 'Kč';
                this.user.custom_categories = prof.custom_categories || this.defCats;
                this.isAdmin = prof.is_admin || false;
                if (this.isAdmin) document.getElementById('tab-adm-link').classList.remove('hidden');
            }
            this.init();
        },

        init() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('userBtn').innerText = this.user.email;
            document.getElementById('stCurr').value = this.curr;
            const today = new Date().toISOString().slice(0,10);
            document.getElementById('expDate').value = today;
            document.getElementById('incDate').value = today;
            this.renderCats();
            this.loadTxns();
        },

        async login() {
            const email = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Přihlášení selhalo: " + error.message); 
            else this.handleAuth(data.user);
        },

        async logout() { await db.auth.signOut(); location.reload(); },

        async loadTxns() {
            const { data, error } = await db.from('transactions')
                .select('*')
                .eq('user_id', this.user.id)
                .order('date', {ascending: false});
            if (error) console.error(error);
            this.txns = data || [];
            this.updateUI();
        },

        updateUI() {
            const now = new Date().toISOString().slice(0,10);
            const total = this.txns.reduce((a, b) => a + b.amount, 0);
            document.getElementById('balToday').innerText = `${total.toLocaleString()} ${this.curr}`;
            
            const filtered = this.curMonth === 'all' ? this.txns : this.txns.filter(t => t.date.slice(0,7) === this.curMonth);
            const listEl = document.getElementById('txnList');
            listEl.innerHTML = '';

            filtered.forEach(t => {
                const isEditing = this.editingId === t.id;
                const div = document.createElement('div');
                div.className = 'txn-item';
                
                if (isEditing) {
                    div.innerHTML = `
                    <div style="width:100%; background:var(--bg); padding:15px; border-radius:12px; border:1px solid var(--primary);">
                        <input type="date" id="edit-date-${t.id}" value="${t.date}">
                        <input type="text" id="edit-desc-${t.id}" value="${t.description}">
                        <input type="number" id="edit-amt-${t.id}" value="${Math.abs(t.amount)}">
                        <div style="display:flex; gap:10px; margin-top:5px;">
                            <button onclick="app.saveInline('${t.id}', ${t.amount > 0})">Uložit</button>
                            <button onclick="app.setEdit(null)" style="background:var(--border); color:var(--text)">Zrušit</button>
                        </div>
                    </div>`;
                } else {
                    div.innerHTML = `
                    <div>
                        <strong style="display:block; margin-bottom:2px;">${t.description}</strong>
                        <small style="opacity:0.5; font-weight:600;">${new Date(t.date).toLocaleDateString()} • ${t.category}</small>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span style="color:${t.amount>0?'var(--income)':'var(--expense)'}; font-weight:800; font-size:1.05rem;">
                            ${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString()} ${this.curr}
                        </span>
                        <div class="menu-container">
                            <span class="menu-button" onclick="app.toggleMenu('${t.id}')">⋮</span>
                            <div class="menu-options" id="menu-${t.id}">
                                <span onclick="app.setEdit('${t.id}')">✏️ Upravit záznam</span>
                                <span onclick="app.delTxn('${t.id}')" style="color:var(--expense)">❌ Smazat</span>
                            </div>
                        </div>
                    </div>`;
                }
                listEl.appendChild(div);
            });
            
            this.renderMonthChips();
            this.updateChart(filtered);
            this.calcDaily(total);
        },

        toggleMenu(id) {
            document.querySelectorAll('.menu-options').forEach(m => m.style.display = 'none');
            const menu = document.getElementById(`menu-${id}`);
            if (menu) menu.style.display = 'block';
        },

        setEdit(id) { this.editingId = id; this.updateUI(); },

        async saveInline(id, isIncome) {
            const date = document.getElementById(`edit-date-${id}`).value;
            const description = document.getElementById(`edit-desc-${id}`).value;
            const amtRaw = parseFloat(document.getElementById(`edit-amt-${id}`).value);
            const amount = isIncome ? Math.abs(amtRaw) : -Math.abs(amtRaw);
            
            await db.from('transactions').update({ date, description, amount }).eq('id', id);
            this.editingId = null;
            this.loadTxns();
        },

        async delTxn(id) {
            if (confirm('Opravdu chcete smazat tuto platbu?')) {
                await db.from('transactions').delete().eq('id', id);
                this.loadTxns();
            }
        },

        calcDaily(bal) {
            const today = new Date();
            const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
            const remainingDays = Math.max(1, lastDay - today.getDate() + 1);
            const daily = Math.max(0, bal / remainingDays);
            document.getElementById('dailyAvg').innerText = `${Math.round(daily).toLocaleString()} ${this.curr}`;
        },

        renderMonthChips() {
            const months = ['all', ...new Set(this.txns.map(t => t.date.slice(0,7)).sort().reverse())];
            document.getElementById('monthChips').innerHTML = months.map(m => `
                <span class="chip ${this.curMonth===m?'selected':''}" onclick="app.setMonth('${m}')">
                    ${m === 'all' ? 'Všechny výpisy' : m.split('-').reverse().join('/')}
                </span>`).join('');
        },
        setMonth(m) { this.curMonth = m; this.updateUI(); },

        async saveTxn(isInc) {
            const pre = isInc ? 'inc' : 'exp';
            const amt = parseFloat(document.getElementById(pre+'Amt').value);
            const desc = document.getElementById(pre+'Desc').value;
            const date = document.getElementById(pre+'Date').value;
            const cat = isInc ? 'Příjem' : document.getElementById('expCat').value;

            if (isNaN(amt) || !desc) { alert("Vyplňte prosím částku a popis."); return; }

            await db.from('transactions').insert([{
                user_id: this.user.id, 
                amount: isInc ? amt : -amt, 
                description: desc,
                category: cat,
                date: date
            }]);
            
            document.getElementById(pre+'Amt').value = '';
            document.getElementById(pre+'Desc').value = '';
            this.loadTxns();
        },

        updateChart(list) {
            const ctx = document.getElementById('myChart');
            const expenses = list.filter(t => t.amount < 0);
            const dataMap = {};
            expenses.forEach(t => dataMap[t.category] = (dataMap[t.category] || 0) + Math.abs(t.amount));
            
            if (chart) chart.destroy();
            if (expenses.length === 0) return;

            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(dataMap),
                    datasets: [{
                        data: Object.values(dataMap),
                        backgroundColor: ['#0066e1', '#22ad5c', '#9d28b0', '#e60050', '#008183', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    cutout: '70%',
                    plugins: { legend: { display: false } } 
                }
            });
        },

        renderCats() {
            const cats = this.user.custom_categories || this.defCats;
            document.getElementById('expCat').innerHTML = cats.map(c => `<option>${c}</option>`).join('');
            document.getElementById('catEditor').innerHTML = cats.map((c, i) => `
                <div style="display:flex; gap:10px; margin-bottom:8px;">
                    <input value="${c}" onchange="app.editCat(${i}, this.value)" style="margin:0;">
                    <button onclick="app.removeCat(${i})" style="width:45px; margin:0; background:var(--hover-bg); color:var(--expense)">✕</button>
                </div>`).join('');
        },
        async editCat(i, v) { this.user.custom_categories[i] = v; await this.savePref(); this.renderCats(); },
        async removeCat(i) { this.user.custom_categories.splice(i, 1); await this.savePref(); this.renderCats(); },
        async addCat() { this.user.custom_categories.push("Nová kategorie"); await this.savePref(); this.renderCats(); },
        async updateCurr(v) { this.curr = v; await this.savePref(); this.updateUI(); },
        async savePref() { 
            await db.from('app_users').update({ 
                custom_categories: this.user.custom_categories, 
                currency: this.curr 
            }).eq('id', this.user.id); 
        },

        async switchTab(tab) {
            document.getElementById('tab-gen-link').classList.toggle('active', tab === 'general');
            document.getElementById('tab-adm-link').classList.toggle('active', tab === 'admin');
            document.getElementById('tab-general').classList.toggle('hidden', tab !== 'general');
            document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
            if (tab === 'admin') this.loadAdminData();
        },

        async loadAdminData() {
            const container = document.getElementById('adminUserList');
            container.innerHTML = '<p style="padding:20px;">Načítám seznam uživatelů...</p>';
            
            const { data: users } = await db.from('app_users').select('*');
            const { data: allTxns } = await db.from('transactions').select('user_id, amount');
            
            let html = '<table><thead><tr><th>Uživatel</th><th>Zůstatek</th></tr></thead><tbody>';
            users.forEach(u => {
                const bal = allTxns.filter(t => t.user_id === u.id).reduce((s, t) => s + t.amount, 0);
                html += `<tr>
                    <td><div style="font-weight:700;">${u.email}</div><div style="font-size:0.7rem; opacity:0.5;">${u.id}</div></td>
                    <td style="font-weight:700; color:var(--primary);">${bal.toLocaleString()} ${u.currency || 'Kč'}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        },

        async deleteMyAccount() {
            if (confirm("UPOZORNĚNÍ: Smazáním účtu přijdete o všechna data. Pokračovat?")) {
                await db.from('transactions').delete().eq('user_id', this.user.id);
                await db.from('app_users').delete().eq('id', this.user.id);
                this.logout();
            }
        },

        cycleTheme() {
            this.theme = this.theme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', this.theme);
            this.applyTheme();
        },
        applyTheme() {
            document.body.classList.toggle('dark', this.theme === 'dark');
            const btn = document.getElementById('themeBtn');
            btn.innerHTML = this.theme === 'dark' ? '🌙 Tmavý režim' : '☀️ Světelný režim';
        }
    };

    window.app = app;
    app.start();
</script>
</body>
</html>
