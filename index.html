<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Finance v0.3.8</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --tag-bg: #e2e8f0; --hover-bg: #f1f5f9; --field-bg: #ffffff; --field-text: #1e293b; --income: #10b981; --expense: #ef4444; }
        
        /* Dark Mode (v0.3.2 style colors) */
        .dark { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f9fafb; --border: #334155; --tag-bg: #334155; --hover-bg: #4b5563; --field-bg: #ffffff; --field-text: #1e293b; }
        
        /* AMOLED Mode */
        .amoled { --primary: #3b82f6; --bg: #000000; --card: #121212; --text: #ffffff; --border: #222222; --tag-bg: #1a1a1a; --hover-bg: #333333; --field-bg: #ffffff; --field-text: #1e293b; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); transition: background 0.2s; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 320px 1fr 320px; } }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); height: fit-content; margin-bottom: 20px; }
        .header-card { background: var(--primary); color: white; border: none; grid-column: 1 / -1; display: flex; justify-content: space-around; text-align: center; padding: 25px; margin-bottom: 0; }
        .stat-val { font-size: 1.6rem; font-weight: 800; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 0.9rem; background: var(--field-bg); color: var(--field-text); }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .mode-btn, .settings-btn, .lang-btn { width: auto; padding: 6px 12px; font-size: 0.8rem; background: var(--tag-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
        .txn-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .txn-item.future { opacity: 0.5; font-style: italic; }
        .chip { display:inline-block; padding:5px 12px; margin:0 5px 5px 0; background: var(--tag-bg); border-radius:12px; cursor:pointer; font-size:0.8rem; border: 1px solid var(--border); color: var(--text); }
        .chip.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .hidden { display: none !important; }
        .icon-btn { cursor: pointer; opacity: 0.5; margin-left: 10px; font-style: normal; }
        .edit-box { display: flex; flex-direction: column; gap: 5px; width: 100%; background: var(--hover-bg); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="authSection" class="hidden">
    <div style="text-align: right; margin: 20px auto; max-width: 380px;">
        <button class="lang-btn" onclick="app.toggleLang()">🌐 CZ/EN</button>
    </div>
    <div class="card" id="loginBox" style="max-width: 380px; margin: 0 auto;">
        <h2 id="t-loginTitle">Přihlášení</h2>
        <input type="text" id="loginUser">
        <input type="password" id="loginPass">
        <button onclick="app.login()" id="t-loginBtn">Vstoupit</button>
        <p style="text-align:center; font-size: 0.8rem;"><span id="t-noAcc">Nemáte účet?</span> <a href="#" onclick="app.toggleAuth(true)" id="t-regLink">Registrace</a></p>
    </div>
    <div class="card hidden" id="regBox" style="max-width: 380px; margin: 0 auto;">
        <h2 id="t-regTitle">Registrace</h2>
        <input type="text" id="regUser">
        <input type="password" id="regPass">
        <button onclick="app.register()" id="t-regBtn">Vytvořit účet</button>
        <p style="text-align:center; font-size: 0.8rem;"><span id="t-haveAcc">Máte účet?</span> <a href="#" onclick="app.toggleAuth(false)" id="t-loginLink">Přihlášení</a></p>
    </div>
</div>

<div id="mainSection" class="hidden">
    <div style="max-width: 1300px; margin: 0 auto 15px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <strong id="userLabel"></strong>
            <button class="settings-btn" style="margin-left:10px" onclick="app.showSettings()">⚙️ <span id="t-settings">Nastavení</span></button>
        </div>
        <button class="mode-btn" onclick="app.cycleTheme()" id="themeBtn">🌓 Mode: Light</button>
    </div>

    <div class="dashboard-grid">
        <div class="card header-card">
            <div class="stat-box"><div id="t-onAccount">Na účtu</div><div class="stat-val" id="balToday">0</div></div>
            <div class="stat-box"><div id="t-outlook">Výhled</div><div class="stat-val" id="balFuture">0</div></div>
        </div>
        <div id="leftCol">
            <div class="card">
                <h3 style="margin-top:0; color:var(--expense)" id="t-expenses">Výdaje</h3>
                <input type="date" id="expDate">
                <input type="text" id="expDesc">
                <input type="number" id="expAmt">
                <select id="expCat"></select>
                <button onclick="app.saveTxn(false)" style="background: var(--expense);" id="t-saveExp">Uložit</button>
            </div>
            <div class="card">
                <h3 style="margin-top:0; color:var(--income)" id="t-income">Příjmy</h3>
                <input type="date" id="incDate">
                <input type="text" id="incDesc">
                <input type="number" id="incAmt">
                <button onclick="app.saveTxn(true)" style="background: var(--income);" id="t-saveInc">Uložit</button>
            </div>
        </div>
        <div id="midCol">
            <div class="card">
                <h3 style="margin-top:0" id="t-history">Historie</h3>
                <div id="monthChips" style="margin-bottom: 15px; overflow-x: auto; white-space: nowrap;"></div>
                <div id="txnList"></div>
            </div>
        </div>
        <div id="rightCol">
            <div class="card" style="text-align: center;">
                <small id="t-dailyLimit">Denní limit do výplaty:</small>
                <div id="dailyAvg" style="font-size: 1.5rem; font-weight: 800;">0</div>
            </div>
            <div class="card"><canvas id="myChart"></canvas></div>
            <button onclick="app.logout()" style="background: #64748b; font-size: 0.8rem; border-radius: 8px; padding: 10px; color: white; border: none; width: 100%; cursor: pointer;" id="t-logout">Odhlásit se</button>
        </div>
    </div>
</div>

<div id="settingsOverlay" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="max-width: 450px; width: 90%;">
        <h2 id="t-stTitle">Nastavení</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
            <div>
                <label style="font-size:0.8rem" id="t-stLang">Jazyk</label>
                <select id="stLang" onchange="app.updatePref('lang', this.value)">
                    <option value="cs">Čeština</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div>
                <label style="font-size:0.8rem" id="t-stCurr">Měna</label>
                <select id="stCurr" onchange="app.updatePref('curr', this.value)">
                    <option value="Kč">CZK (Kč)</option>
                    <option value="€">EUR (€)</option>
                    <option value="$">USD ($)</option>
                </select>
            </div>
        </div>
        <div id="userOnly">
            <h4 id="t-stCats">Moje kategorie</h4>
            <div id="catEditor"></div>
            <button onclick="app.addCat()">+ <span id="t-add">Přidat</span></button>
        </div>
        <button onclick="app.hideSettings()" style="margin-top:20px; background:var(--text)" id="t-close">Zavřít</button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const db = createClient('https://tnrtxrxwzwhsiqtahxzy.supabase.co', 'sb_publishable_hsQEHlhnq-G2gk7ospOI0g_HuSlwTIC');
    let chart = null;

    const i18n = {
        cs: {
            loginTitle: "Přihlášení", loginBtn: "Vstoupit", noAcc: "Nemáte účet?", regLink: "Registrace",
            regTitle: "Registrace", regBtn: "Vytvořit účet", haveAcc: "Máte účet?", loginLink: "Přihlášení",
            settings: "Nastavení", onAccount: "Na účtu", outlook: "Výhled", expenses: "Výdaje", income: "Příjmy",
            history: "Historie", dailyLimit: "Denní limit do výplaty:", logout: "Odhlásit se", stTitle: "Nastavení",
            stLang: "Jazyk", stCurr: "Měna", stCats: "Moje kategorie (max 10)", add: "Přidat", close: "Zavřít",
            save: "Uložit", back: "Zpět", placeholderExp: "Obchodník / Položka", placeholderInc: "Popis příjmu",
            all: "Vše", confirmDel: "Smazat?", userPH: "Jméno", passPH: "Heslo",
            themeLight: "Světlý", themeDark: "Tmavý", themeAmoled: "AMOLED"
        },
        en: {
            loginTitle: "Login", loginBtn: "Enter", noAcc: "No account?", regLink: "Sign up",
            regTitle: "Sign up", regBtn: "Create account", haveAcc: "Have an account?", loginLink: "Login",
            settings: "Settings", onAccount: "Balance", outlook: "Outlook", expenses: "Expenses", income: "Income",
            history: "History", dailyLimit: "Daily limit until payday:", logout: "Logout", stTitle: "Settings",
            stLang: "Language", stCurr: "Currency", stCats: "My Categories (max 10)", add: "Add", close: "Close",
            save: "Save", back: "Back", placeholderExp: "Merchant / Item", placeholderInc: "Income description",
            all: "All", confirmDel: "Delete?", userPH: "Username", passPH: "Password",
            themeLight: "Light", themeDark: "Dark", themeAmoled: "AMOLED"
        }
    };

    window.app = {
        user: null, txns: [], curMonth: 'all', lang: localStorage.getItem('lang') || 'cs', curr: 'Kč',
        theme: localStorage.getItem('theme') || 'light',
        defCats: ["Jídlo 🍕", "Běžné 🏠", "Blbosti 🛍️", "Nadstandartní ✨", "Spoření 💰"],

        async start() {
            this.applyLang();
            this.applyTheme();
            const savedUid = localStorage.getItem('uid');
            if (savedUid) {
                const { data } = await db.from('app_users').select('*').eq('id', savedUid).maybeSingle();
                if (data) { this.user = data; this.lang = data.lang || this.lang; this.curr = data.currency || this.curr; this.init(); return; }
            }
            document.getElementById('authSection').classList.remove('hidden');
        },

        async login() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value;
            const { data } = await db.from('app_users').select('*').eq('username', u).eq('password', p).maybeSingle();
            if(!data) return alert("Error");
            this.user = data;
            localStorage.setItem('uid', data.id);
            this.lang = data.lang || this.lang;
            this.curr = data.currency || this.curr;
            this.init();
        },

        logout() { localStorage.removeItem('uid'); location.reload(); },

        async register() {
            const u = document.getElementById('regUser').value.trim();
            const p = document.getElementById('regPass').value;
            await db.from('app_users').insert([{ username:u, password:p, is_admin:false, custom_categories:this.defCats, lang:this.lang, currency:this.curr }]);
            this.toggleAuth(false);
        },

        init() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            this.applyLang();
            document.getElementById('userLabel').innerText = `👤 ${this.user.username}`;
            const today = new Date().toISOString().slice(0,10);
            document.getElementById('expDate').value = today; document.getElementById('incDate').value = today;
            this.renderCats(); this.loadTxns();
        },

        async loadTxns() {
            const { data } = await db.from('transactions').select('*').eq('user_id', this.user.id).order('date', {ascending: true});
            this.txns = data || [];
            this.updateUI();
        },

        updateUI() {
            const now = new Date().toISOString().slice(0,10);
            const balToday = this.txns.filter(t => t.date <= now).reduce((a, b) => a + b.amount, 0);
            const balFuture = this.txns.reduce((a, b) => a + b.amount, 0);
            document.getElementById('balToday').innerText = `${balToday.toLocaleString()} ${this.curr}`;
            document.getElementById('balFuture').innerText = `${balFuture.toLocaleString()} ${this.curr}`;
            document.getElementById('dailyAvg').innerText = `${Math.round(balToday / this.calcDays()).toLocaleString()} ${this.curr}`;
            const months = ['all', ...new Set(this.txns.map(t => t.date.slice(0,7)).sort().reverse())];
            document.getElementById('monthChips').innerHTML = months.map(m => `<span class="chip ${this.curMonth===m?'selected':''}" onclick="app.setMonth('${m}')">${m==='all'?i18n[this.lang].all:m}</span>`).join('');
            const filtered = this.curMonth === 'all' ? this.txns : this.txns.filter(t => t.date.slice(0,7) === this.curMonth);
            document.getElementById('txnList').innerHTML = filtered.slice().reverse().map(t => {
                if(this.editingId === t.id) return this.renderEditRow(t);
                return `<div class="txn-item ${t.date > now ? 'future' : ''}"><div><strong>${t.description}</strong><br><small>${t.date > now ? '⏳ ':''}${t.date} • ${t.category}</small></div><div style="color:${t.amount>0?'var(--income)':'var(--expense)'}"><strong>${t.amount.toLocaleString()} ${this.curr}</strong><i class="icon-btn" onclick="app.editingId='${t.id}'; app.updateUI();">✏️</i><i class="icon-btn" onclick="app.delTxn('${t.id}')">✕</i></div></div>`;
            }).join('');
            this.updateChart(filtered);
        },

        renderEditRow(t) {
            const cats = t.amount > 0 ? [(this.lang==='cs'?'Příjem':'Income')] : this.user.custom_categories;
            const l = i18n[this.lang];
            return `<div class="edit-box"><input type="date" id="edDate" value="${t.date}"><input type="text" id="edDesc" value="${t.description}"><input type="number" id="edAmt" value="${Math.abs(t.amount)}"><select id="edCat">${cats.map(c=>`<option ${t.category===c?'selected':''}>${c}</option>`).join('')}</select><div style="display:flex; gap:5px"><button onclick="app.saveEdit('${t.id}', ${t.amount>0})">${l.save}</button><button onclick="app.editingId=null; app.updateUI()" style="background:#64748b">${l.back}</button></div></div>`;
        },

        async saveEdit(id, isInc) {
            const amt = document.getElementById('edAmt').value;
            await db.from('transactions').update({ date: document.getElementById('edDate').value, description: document.getElementById('edDesc').value, amount: isInc ? Math.abs(amt) : -Math.abs(amt), category: document.getElementById('edCat').value }).eq('id', id);
            this.editingId = null; this.loadTxns();
        },

        async saveTxn(isInc) {
            const d = isInc ? document.getElementById('incDate').value : document.getElementById('expDate').value;
            const desc = isInc ? document.getElementById('incDesc').value : document.getElementById('expDesc').value;
            const amt = isInc ? document.getElementById('incAmt').value : document.getElementById('expAmt').value;
            if(!desc || !amt) return;
            await db.from('transactions').insert([{ user_id: this.user.id, description: desc, amount: isInc?Math.abs(amt):-Math.abs(amt), category: isInc?(this.lang==='cs'?'Příjem':'Income'):document.getElementById('expCat').value, date: d }]);
            this.loadTxns();
        },

        async delTxn(id) { if(confirm(i18n[this.lang].confirmDel)) { await db.from('transactions').delete().eq('id', id); this.loadTxns(); } },

        renderCats() {
            document.getElementById('expCat').innerHTML = this.user.custom_categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('catEditor').innerHTML = this.user.custom_categories.map((c, i) => `<div style="display:flex; gap:5px; margin-bottom:5px"><input type="text" value="${c}" onchange="app.editCat(${i}, this.value)" style="margin:0"><button onclick="app.delCat(${i})" style="width:auto; background:var(--expense); margin:0">✕</button></div>`).join('');
        },
        async editCat(i,v) { this.user.custom_categories[i]=v; await this.savePref(); },
        async addCat() { if(this.user.custom_categories.length<10){this.user.custom_categories.push("Nová"); await this.savePref(); this.renderCats();} },
        async delCat(i) { this.user.custom_categories.splice(i,1); await this.savePref(); this.renderCats(); },
        async updatePref(key, val) { if(key === 'lang') { this.lang = val; localStorage.setItem('lang', val); } if(key === 'curr') this.curr = val; await this.savePref(); this.applyLang(); this.updateUI(); },
        async savePref() { if(this.user) await db.from('app_users').update({ custom_categories:this.user.custom_categories, lang: this.lang, currency: this.curr }).eq('id', this.user.id); },

        applyLang() {
            const l = i18n[this.lang];
            Object.keys(l).forEach(key => { const el = document.getElementById('t-' + key); if(el) el.innerText = l[key]; });
            ['loginUser','regUser'].forEach(id => { const el = document.getElementById(id); if(el) el.placeholder = l.userPH; });
            ['loginPass','regPass'].forEach(id => { const el = document.getElementById(id); if(el) el.placeholder = l.passPH; });
            document.getElementById('expDesc').placeholder = l.placeholderExp;
            document.getElementById('incDesc').placeholder = l.placeholderInc;
            document.getElementById('stLang').value = this.lang;
            document.getElementById('stCurr').value = this.curr;
            this.updateThemeBtn();
        },

        toggleLang() { this.lang = this.lang === 'cs' ? 'en' : 'cs'; localStorage.setItem('lang', this.lang); this.applyLang(); },
        showSettings() { document.getElementById('settingsOverlay').classList.remove('hidden'); },
        hideSettings() { document.getElementById('settingsOverlay').classList.add('hidden'); },
        toggleAuth(reg) { document.getElementById('loginBox').classList.toggle('hidden', reg); document.getElementById('regBox').classList.toggle('hidden', !reg); },
        setMonth(m) { this.curMonth = m; this.updateUI(); },
        calcDays() {
            const today = new Date(); const target = new Date(today.getFullYear(), today.getMonth() + 1, 1);
            let wd = 0; while(true) { let d = target.getDay(); if(d !== 0 && d !== 6) wd++; if(wd === 2) break; target.setDate(target.getDate()+1); }
            return Math.max(1, Math.ceil((target - today) / 86400000));
        },
        updateChart(list) {
            const ctx = document.getElementById('myChart');
            const data = {}; list.filter(t => t.amount < 0).forEach(t => data[t.category] = (data[t.category]||0) + Math.abs(t.amount));
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#f97316', '#71717a', '#22c55e'] }] }, options: { plugins: { legend: { display:false } } } });
        },
        cycleTheme() {
            if (this.theme === 'light') this.theme = 'dark';
            else if (this.theme === 'dark') this.theme = 'amoled';
            else this.theme = 'light';
            localStorage.setItem('theme', this.theme);
            this.applyTheme();
        },
        applyTheme() {
            document.body.classList.remove('dark', 'amoled');
            if (this.theme !== 'light') document.body.classList.add(this.theme);
            this.updateThemeBtn();
        },
        updateThemeBtn() {
            const btn = document.getElementById('themeBtn');
            if (!btn) return;
            const l = i18n[this.lang];
            const name = this.theme === 'light' ? l.themeLight : (this.theme === 'dark' ? l.themeDark : l.themeAmoled);
            btn.innerText = `🌓 Mode: ${name}`;
        }
    };
    app.start();
</script>
</body>
</html>
