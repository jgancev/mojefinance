<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Finance | Custom Auth</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        .dark { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f9fafb; --border: #334155; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid var(--border); box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .transaction { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container" id="loginSection">
    <div class="card">
        <h2>Přihlášení</h2>
        <input type="text" id="loginUser" placeholder="Uživatelské jméno">
        <input type="password" id="loginPass" placeholder="Heslo">
        <button onclick="handleLogin()">Vstoupit</button>
        <p>Nemáte účet? <a href="#" onclick="showSection('registerSection')">Registrace</a></p>
    </div>
</div>

<div class="container" id="registerSection" style="display:none">
    <div class="card">
        <h2>Nová registrace</h2>
        <input type="text" id="regUser" placeholder="Uživatelské jméno">
        <input type="password" id="regPass" placeholder="Heslo">
        <button onclick="handleRegister()">Vytvořit účet</button>
        <p><a href="#" onclick="showSection('loginSection')">Zpět na přihlášení</a></p>
    </div>
</div>

<div class="container" id="appSection" style="display:none">
    <div style="text-align:right; margin-bottom: 5px;">
        <span id="userNameDisplay"></span> | <a href="#" onclick="logout()">Odhlásit</a>
    </div>
    
    <div class="header">
        <div>Aktuální zůstatek</div>
        <h1 id="totalBalance">0 Kč</h1>
    </div>

    <div class="card">
        <h3>Přidat záznam</h3>
        <input type="date" id="txnDate">
        <input type="text" id="txnDesc" placeholder="Popis">
        <input type="number" id="txnAmount" placeholder="Částka (mínus pro výdaj)">
        <select id="txnCat">
            <option value="Jídlo">Jídlo 🍕</option>
            <option value="Běžné">Běžné 🏠</option>
            <option value="Příjem">Příjem 💰</option>
        </select>
        <button onclick="addTransaction()">Uložit</button>
    </div>

    <div class="card">
        <h3>Historie</h3>
        <div id="txnList"></div>
    </div>
</div>

<script>
    // DOPLŇTE SVÉ ÚDAJE
    const SUPABASE_URL = 'https://tnrtxrxwzwhsiqtahxzy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hsQEHlhnq-G2gk7ospOI0g_HuSlwTIC';
    const supabase = libsupabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    // --- LOGIKA PŘIHLÁŠENÍ (přes tabulku app_users) ---
    async function handleLogin() {
        const user = document.getElementById('loginUser').value;
        const pass = document.getElementById('loginPass').value;

        const { data, error } = await supabase
            .from('app_users')
            .select('*')
            .eq('username', user)
            .eq('password', pass)
            .single();

        if (error || !data) {
            alert('Neplatné jméno nebo heslo');
        } else {
            currentUser = data;
            sessionStorage.setItem('user', JSON.stringify(data));
            startApp();
        }
    }

    async function handleRegister() {
        const user = document.getElementById('regUser').value;
        const pass = document.getElementById('regPass').value;

        const { error } = await supabase
            .from('app_users')
            .insert([{ username: user, password: pass }]);

        if (error) {
            alert('Uživatel již existuje nebo jiná chyba.');
        } else {
            alert('Registrace hotova, nyní se přihlaste.');
            showSection('loginSection');
        }
    }

    function startApp() {
        showSection('appSection');
        document.getElementById('userNameDisplay').innerText = currentUser.username;
        document.getElementById('txnDate').value = new Date().toISOString().split('T')[0];
        loadData();
    }

    async function loadData() {
        const { data, error } = await supabase
            .from('transactions')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('date', { ascending: false });

        if (error) return;
        
        const list = document.getElementById('txnList');
        const balanceEl = document.getElementById('totalBalance');
        list.innerHTML = '';
        let total = 0;

        data.forEach(t => {
            total += parseFloat(t.amount);
            list.innerHTML += `
                <div class="transaction">
                    <span>${t.description} (${t.date})</span>
                    <b style="color:${t.amount < 0 ? 'red' : 'green'}">${t.amount} Kč</b>
                </div>`;
        });
        balanceEl.innerText = total.toLocaleString() + " Kč";
    }

    async function addTransaction() {
        const description = document.getElementById('txnDesc').value;
        const amount = document.getElementById('txnAmount').value;
        const category = document.getElementById('txnCat').value;
        const date = document.getElementById('txnDate').value;

        await supabase.from('transactions').insert([
            { user_id: currentUser.id, description, amount, category, date }
        ]);

        document.getElementById('txnDesc').value = '';
        document.getElementById('txnAmount').value = '';
        loadData();
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    function showSection(id) {
        document.getElementById('loginSection').style.display = id === 'loginSection' ? 'block' : 'none';
        document.getElementById('registerSection').style.display = id === 'registerSection' ? 'block' : 'none';
        document.getElementById('appSection').style.display = id === 'appSection' ? 'block' : 'none';
    }

    // Auto-login z session
    const savedUser = sessionStorage.getItem('user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        startApp();
    }
</script>
</body>
</html>
