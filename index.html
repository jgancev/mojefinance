<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje Finance</title>
<style>
body { font-family:sans-serif; margin:20px; background:#f8fafc; color:#1e293b; }
.container { max-width:500px; margin:0 auto; }
input, button, select { width:100%; padding:10px; margin:5px 0; }
button { background:#2563eb; color:white; border:none; cursor:pointer; }
.transaction { display:flex; justify-content:space-between; border-bottom:1px solid #ccc; padding:5px 0; }
</style>
</head>
<body>

<div class="container" id="loginSection">
    <h2>Přihlášení</h2>
    <input type="text" id="loginUser" placeholder="Uživatelské jméno">
    <input type="password" id="loginPass" placeholder="Heslo">
    <button onclick="login()">Přihlásit</button>
    <p>Nemáte účet? <a href="#" onclick="showRegister()">Zaregistrovat</a></p>
</div>

<div class="container" id="registerSection" style="display:none">
    <h2>Registrace</h2>
    <input type="text" id="regUser" placeholder="Uživatelské jméno">
    <input type="password" id="regPass" placeholder="Heslo">
    <button onclick="register()">Vytvořit účet</button>
    <p>Máte účet? <a href="#" onclick="showLogin()">Přihlásit</a></p>
</div>

<div class="container" id="appSection" style="display:none">
    <h2>Vítejte, <span id="currentUser"></span></h2>
    <button onclick="logout()">Odhlásit</button>
    <hr>
    <h3>Přidat transakci</h3>
    <input type="date" id="date">
    <input type="text" id="desc" placeholder="Popis">
    <input type="number" id="amount" placeholder="Částka">
    <select id="cat">
        <option>Jídlo</option>
        <option>Běžné</option>
        <option>Blbosti</option>
        <option>Spoření</option>
    </select>
    <button onclick="addTransaction()">Uložit</button>
    <hr>
    <h3>Historie</h3>
    <div id="txnList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase init
const supabase = Supabase.createClient(
    'https://tnrtxrxwzwhsiqtahxzy.supabase.co',
    'sb_publishable_hsQEHlhnq-G2gk7ospOI0g_HuSlwTIC'
);

// Frontend hash
function hash(str){return btoa(str);}

// UI helpers
function showSection(id){
    ['loginSection','registerSection','appSection'].forEach(s=>{
        document.getElementById(s).style.display = s===id?'block':'none';
    });
}

function showLogin(){ showSection('loginSection'); }
function showRegister(){ showSection('registerSection'); }
function setCurrentUserName(name){ document.getElementById('currentUser').innerText=name; }

// Current user stored in memory
let currentUser = null;

// --- Users table helpers ---
async function getUsers(){
    const { data, error } = await supabase.from('users').select('*');
    return data || [];
}

async function insertUser(username, password_hash){
    return await supabase.from('users').insert([{ username, password_hash }]);
}

async function findUser(username){
    const { data } = await supabase.from('users').select('*').eq('username', username);
    return data[0];
}

// --- Transactions table helpers ---
async function getTransactions(){
    if(!currentUser) return [];
    const { data } = await supabase.from('transactions').select('*').eq('user_id', currentUser.id);
    return data || [];
}

async function insertTransaction(date, description, amount, category){
    if(!currentUser) return;
    await supabase.from('transactions').insert([{
        user_id: currentUser.id,
        date, description, amount, category
    }]);
}

// --- Actions ---
async function register(){
    const username = document.getElementById('regUser').value.trim();
    const password = document.getElementById('regPass').value;
    if(!username || !password) return alert('Vyplň vše!');
    const exists = await findUser(username);
    if(exists) return alert('Uživatel už existuje');
    await insertUser(username, hash(password));
    alert('Účet vytvořen, přihlaš se.');
    showLogin();
}

async function login(){
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value;
    const user = await findUser(username);
    if(!user || user.password_hash !== hash(password)) return alert('Špatné přihlášení');
    currentUser = user;
    setCurrentUserName(user.username);
    showSection('appSection');
    loadTransactions();
}

function logout(){
    currentUser = null;
    showLogin();
}

// Transactions UI
async function loadTransactions(){
    const txns = await getTransactions();
    const div = document.getElementById('txnList');
    div.innerHTML='';
    txns.forEach(t=>{
        div.innerHTML+=`<div class="transaction">
            <span>${t.date} - ${t.description}</span>
            <span>${t.amount} Kč (${t.category})</span>
        </div>`;
    });
}

async function addTransaction(){
    const date=document.getElementById('date').value;
    const desc=document.getElementById('desc').value;
    const amount=Number(document.getElementById('amount').value);
    const cat=document.getElementById('cat').value;
    if(!date||!desc||!amount) return alert('Vyplň vše!');
    await insertTransaction(date, desc, amount, cat);
    document.getElementById('desc').value='';
    document.getElementById('amount').value='';
    loadTransactions();
}

// Init
showLogin();
</script>

</body>
</html>
