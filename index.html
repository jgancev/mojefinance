<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Finance</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --tag-bg: #e2e8f0; --hover-bg: #f1f5f9; --field-bg: #ffffff; --field-text: #1e293b; }
        .dark { --primary: #1e40af; --bg: #121212; --card: #374151; --text: #f9fafb; --border: #4b5563; --tag-bg: #4b5563; --hover-bg: #4b5563; --field-bg: #ffffff; --field-text: #1e293b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 500px; margin: 0 auto; }
        .header-card { background: var(--primary); color: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .stats { display: flex; justify-content: space-between; }
        .stat-val { font-size: 1.5rem; font-weight: bold; }
        .form-card, .list-card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
        .chart-card { max-width: 300px; margin: 0 auto; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 1rem; background: var(--field-bg); color: var(--field-text); }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .transaction { position: relative; display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .menu-container { position: relative; display: inline-block; }
        .menu-button { cursor: pointer; padding: 0 4px; }
        .menu-options { display: none; position: absolute; right: 0; top: 100%; background: var(--card); border: 1px solid #ccc; border-radius: 4px; box-shadow: 0 2px 4px rgba(0,0,0,.1); z-index: 100; }
        .menu-options span { display: block; padding: 8px 12px; cursor: pointer; white-space: nowrap; color: var(--text); }
        .menu-options span:hover { background: var(--hover-bg); }
        .month-chip { display:inline-block; padding:4px 8px; margin:0 4px 4px 0; background: var(--tag-bg); border-radius:12px; cursor:pointer; font-size:0.9rem; color: var(--text); }
        .month-chip.selected { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container" id="loginSection">
    <h2>Přihlášení</h2>
    <input type="text" id="loginUser" placeholder="Uživatelské jméno">
    <input type="password" id="loginPass" placeholder="Heslo">
    <button type="button" onclick="app.login()">Přihlásit</button>
    <p>Nemáte účet? <a href="javascript:void(0)" onclick="app.showRegister()">Zaregistrovat</a></p>
</div>

<div class="container" id="registerSection" style="display:none">
    <h2>Registrace</h2>
    <input type="text" id="regUser" placeholder="Uživatelské jméno">
    <input type="password" id="regPass" placeholder="Heslo">
    <button type="button" onclick="app.register()">Vytvořit účet</button>
    <p>Máte účet? <a href="javascript:void(0)" onclick="app.showLogin()">Přihlásit</a></p>
</div>

<div class="container" id="appSection" style="display:none">
    <div style="text-align:right; margin-bottom:10px;">
        <span id="currentUserInfo"></span>
    </div>
    <div class="header-card">
        <div style="margin-bottom: 15px;">Zůstatek</div>
        <div class="stat-val" id="totalBalance">0 Kč</div>
        <hr style="border: none; border-top: 1px solid var(--border); opacity: 0.2; margin: 15px 0;">
        <div class="stats">
            <div><small>Na den</small><div id="dailyAvg">0 Kč</div></div>
        </div>
    </div>

    <div class="form-card" id="expenseForm">
        <h3 style="margin-top:0">Výdaje</h3>
        <input type="date" id="date">
        <input type="text" id="desc" placeholder="Obchodník / Položka">
        <input type="number" id="amount" placeholder="Částka (Kč)">
        <select id="cat">
            <option value="Jídlo">Jídlo 🍕</option>
            <option value="Běžné">Běžné 🏠</option>
            <option value="Blbosti">Blbosti 🛍️</option>
            <option value="Nadst.">Nadstandartní ✨</option>
            <option value="Spoření">Spoření 💰</option>
        </select>
        <button onclick="app.addTransaction()">Uložit</button>
    </div>

    <div class="list-card" id="history">
        <h3 style="margin-top:0">Historie</h3>
        <div id="monthChips" style="margin-bottom:10px;"></div>
        <div id="txnList"></div>
    </div>

    <div class="form-card">
        <h3 style="margin-top:0">Příjmy</h3>
        <input type="date" id="dateIncome">
        <input type="text" id="descIncome" placeholder="Popis příjmu">
        <input type="number" id="amountIncome" placeholder="Částka (Kč)">
        <button onclick="app.addIncome()">Uložit</button>
    </div>

    <button onclick="app.clearData()" style="background: #ef4444; font-size: 0.7rem;">Smazat data tohoto uživatele</button>

    <div class="list-card chart-card">
        <canvas id="myChart"></canvas>
    </div>

    <div style="text-align:center; margin-top:10px;">
        <label><input type="checkbox" id="darkToggle" onchange="app.toggleDarkMode()"> Dark mode</label>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SB_URL = 'https://tnrtxrxwzwhsiqtahxzy.supabase.co';
    const SB_KEY = 'sb_publishable_hsQEHlhnq-G2gk7ospOI0g_HuSlwTIC';
    const db = createClient(SB_URL, SB_KEY);

    let myChart = null;

    window.app = {
        user: null,
        transactions: [],
        currentMonth: 'all',
        editingIndex: null,

        async login() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value;
            const { data } = await db.from('app_users').select('*').eq('username', u).eq('password', p).maybeSingle();
            if (!data) return alert('Špatné přihlášení.');
            this.user = data;
            this.showSection('appSection');
            this.initApp();
        },

        async register() {
            const u = document.getElementById('regUser').value.trim();
            const p = document.getElementById('regPass').value;
            const { error } = await db.from('app_users').insert([{ username: u, password: p }]);
            if (error) return alert('Uživatel už existuje.');
            alert('Účet vytvořen.');
            this.showLogin();
        },

        initApp() {
            document.getElementById('currentUserInfo').innerHTML = `Přihlášen: ${this.user.username} &nbsp; <a href="#" onclick="location.reload()">Odhlásit</a>`;
            const today = new Date().toISOString().slice(0,10);
            document.getElementById('date').value = today;
            document.getElementById('dateIncome').value = today;
            this.loadTransactions();
            this.applyStoredTheme();
        },

        async loadTransactions() {
            const { data, error } = await db.from('transactions').select('*').eq('user_id', this.user.id).order('date', {ascending: true});
            if (error) return;
            // Mapování na tvůj původní formát objektu
            this.transactions = data.map(t => ({ id: t.id, desc: t.description, amount: t.amount, cat: t.category, date: t.date }));
            this.updateUI();
        },

        updateUI() {
            const txnList = document.getElementById('txnList');
            const totalDiv = document.getElementById('totalBalance');
            const dailyDiv = document.getElementById('dailyAvg');

            // Měsíční čipy
            let months = [...new Set(this.transactions.map(t => t.date.slice(0,7)).filter(m => m))];
            months.sort((a,b) => b.localeCompare(a));
            months.unshift('all');
            
            const monthChipsDiv = document.getElementById('monthChips');
            monthChipsDiv.innerHTML = '';
            months.forEach(m => {
                const label = m === 'all' ? 'Vše' : m.split('-')[1] + '/' + m.split('-')[0];
                monthChipsDiv.innerHTML += `<span class="month-chip ${m===this.currentMonth?'selected':''}" onclick="app.selectMonth('${m}')">${label}</span>`;
            });

            let displayTx = this.currentMonth === 'all' ? this.transactions : this.transactions.filter(t => t.date.slice(0,7) === this.currentMonth);

            let total = displayTx.reduce((acc, curr) => acc + Number(curr.amount), 0);
            totalDiv.innerText = `${total.toLocaleString()} Kč`;
            dailyDiv.innerText = `${Math.round(total / this.daysUntilSecondWorkdayNextMonth()).toLocaleString()} Kč`;

            txnList.innerHTML = '';
            displayTx.slice().reverse().forEach((t) => {
                const idx = t.id;
                if (this.editingIndex === idx) {
                    txnList.innerHTML += `
                        <div class="transaction">
                            <div style="width:100%">
                                <input type="date" id="edit-date" value="${t.date}">
                                <input type="text" id="edit-desc" value="${t.desc}">
                                <input type="number" id="edit-amount" value="${Math.abs(t.amount)}">
                                ${t.amount < 0 ? `<select id="edit-cat">
                                    <option value="Jídlo" ${t.cat==='Jídlo'?'selected':''}>Jídlo 🍕</option>
                                    <option value="Běžné" ${t.cat==='Běžné'?'selected':''}>Běžné 🏠</option>
                                    <option value="Blbosti" ${t.cat==='Blbosti'?'selected':''}>Blbosti 🛍️</option>
                                    <option value="Nadst." ${t.cat==='Nadst.'?'selected':''}>Nadstavba ✨</option>
                                    <option value="Spoření" ${t.cat==='Spoření'?'selected':''}>Spoření 💰</option>
                                </select>` : ''}
                                <button onclick="app.saveInline('${idx}')">Uložit</button>
                                <button onclick="app.cancelInline()">Zrušit</button>
                            </div>
                        </div>`;
                } else {
                    txnList.innerHTML += `
                        <div class="transaction">
                            <div><strong>${t.desc}</strong><br><small>${new Date(t.date).toLocaleDateString()}</small></div>
                            <div style="color: ${t.amount < 0 ? '#ef4444' : '#10b981'}">
                                ${Number(t.amount).toLocaleString()} Kč
                                <span class="menu-container">
                                    <span class="menu-button" onclick="app.toggleMenu('${idx}')">⋮</span>
                                    <div class="menu-options" id="menu-${idx}">
                                        <span onclick="app.startEdit('${idx}')">✏️ Upravit</span>
                                        <span onclick="app.deleteTransaction('${idx}')">❌ Smazat</span>
                                    </div>
                                </span>
                            </div>
                        </div>`;
                }
            });
            this.updateChart(displayTx);
        },

        async addTransaction() {
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;
            const cat = document.getElementById('cat').value;
            const date = document.getElementById('date').value;
            if(!desc || !amount) return alert("Vyplň vše!");
            await db.from('transactions').insert([{ user_id: this.user.id, description: desc, amount: -Math.abs(amount), category: cat, date }]);
            document.getElementById('desc').value = ''; document.getElementById('amount').value = '';
            this.loadTransactions();
        },

        async addIncome() {
            const desc = document.getElementById('descIncome').value;
            const amount = document.getElementById('amountIncome').value;
            const date = document.getElementById('dateIncome').value;
            if(!desc || !amount) return alert("Vyplň vše!");
            await db.from('transactions').insert([{ user_id: this.user.id, description: desc, amount: Math.abs(amount), category: 'Příjmy', date }]);
            document.getElementById('descIncome').value = ''; document.getElementById('amountIncome').value = '';
            this.loadTransactions();
        },

        async deleteTransaction(id) {
            if(confirm('Smazat?')) { await db.from('transactions').delete().eq('id', id); this.loadTransactions(); }
        },

        async saveInline(id) {
            const date = document.getElementById('edit-date').value;
            const desc = document.getElementById('edit-desc').value;
            const amount = document.getElementById('edit-amount').value;
            const catEl = document.getElementById('edit-cat');
            const cat = catEl ? catEl.value : 'Příjmy';
            const finalAmt = cat === 'Příjmy' ? Math.abs(amount) : -Math.abs(amount);
            
            await db.from('transactions').update({ description: desc, amount: finalAmt, category: cat, date }).eq('id', id);
            this.editingIndex = null;
            this.loadTransactions();
        },

        startEdit(id) { this.editingIndex = id; this.updateUI(); },
        cancelInline() { this.editingIndex = null; this.updateUI(); },
        selectMonth(m) { this.currentMonth = m; this.updateUI(); },
        toggleMenu(id) {
            const m = document.getElementById(`menu-${id}`);
            const visible = m.style.display === 'block';
            document.querySelectorAll('.menu-options').forEach(el => el.style.display = 'none');
            m.style.display = visible ? 'none' : 'block';
        },

        updateChart(list) {
            const ctx = document.getElementById('myChart').getContext('2d');
            const summary = {};
            list.forEach(t => { if (t.amount < 0) summary[t.cat] = (summary[t.cat] || 0) + Math.abs(t.amount); });
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(summary),
                    datasets: [{ data: Object.values(summary), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: document.body.classList.contains('dark') ? '#f9fafb' : '#1e293b' } } } }
            });
        },

        daysUntilSecondWorkdayNextMonth() {
            const today = new Date();
            const target = new Date(today.getFullYear(), today.getMonth() + 1, 1);
            let workdays = 0;
            while (true) {
                const day = target.getDay();
                if (day !== 0 && day !== 6) { workdays++; if (workdays === 2) break; }
                target.setDate(target.getDate() + 1);
            }
            return Math.ceil((target - today) / 86400000) || 1;
        },

        async clearData() { if(confirm("Smazat vše?")) { await db.from('transactions').delete().eq('user_id', this.user.id); this.loadTransactions(); } },
        showSection(id) { ['loginSection', 'registerSection', 'appSection'].forEach(s => document.getElementById(s).style.display = s === id ? 'block' : 'none'); },
        showLogin() { this.showSection('loginSection'); },
        showRegister() { this.showSection('registerSection'); },
        toggleDarkMode() {
            const enabled = document.getElementById('darkToggle').checked;
            document.body.classList.toggle('dark', enabled);
            localStorage.setItem('darkMode', enabled);
            if(this.user) this.updateUI();
        },
        applyStoredTheme() {
            const enabled = localStorage.getItem('darkMode') === 'true';
            document.body.classList.toggle('dark', enabled);
            document.getElementById('darkToggle').checked = enabled;
        }
    };

    // Close menus on click outside
    document.addEventListener('click', e => { if (!e.target.closest('.menu-container')) document.querySelectorAll('.menu-options').forEach(m => m.style.display = 'none'); });
    app.applyStoredTheme();
</script>
</body>
</html>
