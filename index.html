<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="authSection" class="hidden">
    <div class="card" style="max-width: 380px; margin: 100px auto;">
        <h2>Přihlášení</h2>
        <input type="email" id="loginUser" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Heslo">
        <button id="loginBtn">Vstoupit</button>
    </div>
</div>

<div id="mainSection" class="hidden">
    <div style="max-width: 1500px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 25px;">
        <h1 style="margin:0">Přehled</h1>
        <div>
            <span id="userLabel" style="color:var(--text-secondary); margin-right:15px"></span>
            <button class="settings-btn" id="openSettings">⚙️</button>
            <button class="settings-btn hidden" id="openAdmin">👑 Admin</button>
            <button class="settings-btn" id="themeBtn">🌓</button>
        </div>
    </div>
    
    <div class="dashboard-grid">
        <div id="leftCol">
            <div class="card">
                <div class="stat-val" id="balToday">0</div>
                <small>Aktuální zůstatek</small>
            </div>
            <div class="card">
                <h3 style="color:var(--accent-red)">Výdaj</h3>
                <input type="date" id="expDate">
                <input type="text" id="expDesc" placeholder="Popis">
                <input type="number" id="expAmt" placeholder="0">
                <select id="expCat"></select>
                <button id="saveExpBtn" style="background:var(--accent-red)">Uložit</button>
            </div>
            <div class="card">
                <h3 style="color:var(--accent-green)">Příjem</h3>
                <input type="date" id="incDate">
                <input type="text" id="incDesc" placeholder="Popis">
                <input type="number" id="incAmt" placeholder="0">
                <button id="saveIncBtn" style="background:var(--accent-green)">Uložit</button>
            </div>
        </div>

        <div id="midCol">
            <div class="card">
                <h3>Historie</h3>
                <div id="monthChips"></div>
                <div id="txnList"></div>
            </div>
        </div>

        <div id="rightCol">
            <div class="card">
                <small>Denní limit</small>
                <div id="dailyAvg" style="font-size: 1.8rem; font-weight: 800; color:var(--accent-blue); text-align:center">0</div>
            </div>
            <div class="card"><canvas id="myChart"></canvas></div>
            <button id="logoutBtn" style="background:var(--border)">Odhlásit se</button>
        </div>
    </div>
</div>

<div id="settingsOverlay" class="overlay hidden">
    <div class="card" style="width: 90%; max-width: 400px;">
        <h2>Nastavení</h2>
        <select id="stCurr"><option value="Kč">Kč</option><option value="€">€</option></select>
        <div id="catEditor"></div>
        <button id="addCatBtn">+ Kategorie</button>
        <button id="closeSettings" style="background:var(--border)">Zavřít</button>
    </div>
</div>

<div id="adminOverlay" class="overlay hidden">
    <div class="card" style="width: 95%; max-width: 600px;">
        <h2>Admin Panel</h2>
        <div id="adminUserList"></div>
        <button id="closeAdmin" style="background:var(--border)">Zavřít</button>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
